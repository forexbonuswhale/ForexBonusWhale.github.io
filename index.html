    <script>
      const originalFetch = window.fetch;
      window.fetch = async function(...args) {
        if (typeof args[0] === 'string' && args[0].includes('brokers.json')) {
          try {
            // داواکاری ناردن بۆ فایربەیس لەجیاتی فایلی ناوخۆیی
            const response = await originalFetch("https://froexbonuswhale-default-rtdb.firebaseio.com/brokers.json", args[1]);
            const data = await response.json();
            
            // ئەگەر داتاکان بە شێوازی ئۆبجێکت بن (فۆرماتی فایربەیس)، دەیگۆڕین بۆ لیست (Array)
            if (data && typeof data === 'object' && !Array.isArray(data)) {
              const formattedArray = Object.keys(data).map(key => {
                if (data[key] && typeof data[key] === 'object') {
                  return { fbKey: key, ...data[key] };
                }
                return data[key];
              }).filter(item => item !== null);
              
              // دروستکردنی وەڵامێکی ساختەی سەرکەوتوو بۆ ئەپەکە
              return new Response(JSON.stringify(formattedArray), {
                status: 200,
                headers: { 'Content-Type': 'application/json' }
              });
            }
            
            // ئەگەر خۆی لیست بوو، وەک خۆی دەینێرین
            return new Response(JSON.stringify(data), {
              status: 200,
              headers: { 'Content-Type': 'application/json' }
            });
          } catch (error) {
            console.error("Firebase Sync Error:", error);
          }
        }
        return originalFetch.apply(this, args);
      };
    </script>
