    <script type="module">
      // Initialize data sync before React loads
      (function() {
        const STORAGE_KEY = 'adminBrokers_v1';
        const BROKERS_JSON_URL = '/brokers.json';
        
        // Get brokers from localStorage or fetch from JSON
        async function initBrokersData() {
          try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
              window.brokersData = JSON.parse(stored);
            } else {
              // Fallback to brokers.json if localStorage empty
              const response = await fetch(BROKERS_JSON_URL);
              const data = await response.json();
              window.brokersData = data;
              // Also save to localStorage for admin panel
              localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }
          } catch (e) {
            console.warn('Failed to load brokers data:', e);
            window.brokersData = [];
          }
        }
        
        // Initialize immediately
        initBrokersData();
        
        // Listen for storage changes from admin panel
        window.addEventListener('storage', function(e) {
          if (e.key === STORAGE_KEY && e.newValue) {
            try {
              window.brokersData = JSON.parse(e.newValue);
              // Dispatch custom event for React to listen to
              window.dispatchEvent(new CustomEvent('brokersUpdated', { 
                detail: window.brokersData 
              }));
            } catch (err) {
              console.warn('Failed to update brokers:', err);
            }
          }
        });
        
        // Expose helper functions
        window.getBrokers = function() {
          try {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : window.brokersData || [];
          } catch (e) {
            return window.brokersData || [];
          }
        };
        
        window.syncBrokersToFile = async function() {
          try {
            const brokers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            // This would require backend API to save to brokers.json
            console.log('Brokers synced:', brokers.length);
            return true;
          } catch (e) {
            console.error('Failed to sync brokers:', e);
            return false;
          }
        };
      })();
    </script>
