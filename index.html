<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForexBonusWhale | Premium Bonuses</title>
    <style>
        :root { --gold: #e5b300; --bg: #0a0f18; --card-bg: #131a26; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* مینیوی سەرەکی */
        nav { padding: 20px 5%; background: #000; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: bold; color: var(--gold); }
        .nav-links a { color: #fff; margin-left: 20px; text-decoration: none; }

        /* بەشی فلتەر */
        .hero { padding: 40px 20px; text-align: center; }
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--gold); background: transparent; color: #fff; cursor: pointer; }
        .filter-btn.active { background: var(--gold); color: #000; }

        /* کارتی بۆنس */
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; width: 320px; margin: 20px auto; border: 1px solid #232d3d; }
        .bonus-amount { color: var(--gold); font-size: 40px; font-weight: bold; }
        .review-section { margin-top: 15px; font-size: 14px; color: #888; border-top: 1px solid #232d3d; pt: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ForexBonusWhale 🐋</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">No-Deposit</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Best No-Deposit Bonuses</h1>
        
        <div class="filter-bar">
            <button class="filter-btn active">Most Popular</button>
            <button class="filter-btn">Top Rated</button>
            <button class="filter-btn">Active Bonuses</button>
        </div>

        <div class="card">
            <h3>Ryvotrade</h3>
            <div class="bonus-amount">$100</div>
            <p>5-Day Trading Challenge</p>
            <div class="review-section">
                <span>⭐⭐⭐⭐⭐ (4.9/5)</span>
                <p>User Review: "Great broker for beginners!"</p>
            </div>
            <button style="background: var(--gold); border: none; padding: 10px 20px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold;">Claim Bonus</button>
        </div>
    </div>

</body>
</html>
