<script>
    // ------------------------------
    // GENERATE 20 BONUSES PER CATEGORY (No "test" labels, realistic)
    // ------------------------------
    const bonusNamePool = [
        "Whale Starter", "Golden Depths", "Majestic Wave", "Deep Blue Boost", "Orca Profit", "Sperm Whale Cash", 
        "Leviathan Reward", "Tidal Surge", "Coral Bonus", "Abyss Gold", "Whale Hunter", "Moby Dick Freebie", 
        "Ocean Elite", "Kraken Spins", "Pearl Treasure", "Narwhal Special", "Blue Whale Pack", "Finback Rise", 
        "Humpback Yield", "Whale Song Bonus"
    ];
    const brokerPool = [
        "FXBlue", "OceanMarkets", "WhaleFX", "DeepForex", "Apex Capital", "EliteTrade", "Global Prime", 
        "TideBroker", "CurrentX", "WaveInvest", "StellarFX", "TitanTrade", "FortuneForex", "Aston Brokers"
    ];

    function randomDate(startYear = 2024, endYear = 2026) {
        const start = new Date(startYear, 0, 1);
        const end = new Date(endYear, 11, 31);
        return new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
    }

    function randomRating() {
        return parseFloat((Math.random() * 3.5 + 1.5).toFixed(1));
    }

    function randomPopularity() {
        return Math.floor(Math.random() * 900) + 50;
    }

    function generateBonusArray(categoryPrefix, count = 20) {
        let arr = [];
        for (let i = 1; i <= count; i++) {
            const name = `${bonusNamePool[i % bonusNamePool.length]} ${categoryPrefix.slice(0,2)}${i}`;
            const broker = brokerPool[Math.floor(Math.random() * brokerPool.length)];
            const rating = randomRating();
            const reviewsCount = Math.floor(Math.random() * 180) + 5;
            const popularity = randomPopularity();
            const dateAdded = randomDate(2024, 2026);
            const description = `Get up to ${Math.floor(Math.random() * 500) + 25}$ or ${Math.floor(Math.random() * 100) + 20}% extra trading credit. Minimum deposit varies.`;
            const terms = `📜 Terms: Valid for new traders, wagering requirement ${Math.floor(Math.random() * 35) + 10}x. Max withdrawal limits apply. Valid for 30 days. Standard forex risk warning.`;
            
            // Pre-fill 2-3 mock reviews
            const mockReviews = [];
            const mockNames = ["WhaleTrader", "GoldenFish", "DeepDiver", "CryptoOrca", "WaveRider"];
            const numReviews = Math.floor(Math.random() * 3) + 1;
            for (let r = 0; r < numReviews; r++) {
                mockReviews.push({
                    user: mockNames[Math.floor(Math.random() * mockNames.length)] + Math.floor(Math.random()*100),
                    stars: parseFloat((Math.random() * 4 + 1).toFixed(1)),
                    comment: "Great bonus conditions! Fast processing. Recommended."
                });
            }
            arr.push({
                id: `${categoryPrefix}_${i}`,
                name: name,
                broker: broker,
                rating: rating,
                reviewsCount: reviewsCount,
                popularity: popularity,
                date: dateAdded,
                description: description,
                terms: terms,
                category: categoryPrefix,
                comments: mockReviews
            });
        }
        // adjust rating average based on comments (make it consistent)
        arr.forEach(b => {
            let total = b.comments.reduce((sum, c) => sum + c.stars, 0);
            if(b.comments.length) {
                let newAvg = total / b.comments.length;
                b.rating = parseFloat(newAvg.toFixed(1));
                b.reviewsCount = b.comments.length;
            }
        });
        return arr;
    }

    // Data storage
    let dataStore = {
        nodb: generateBonusArray("NoDeposit", 20),
        deposit: generateBonusArray("Deposit", 20),
        contests: generateBonusArray("Contest", 20)
    };

    let activeTab = "nodb";     // nodb, deposit, contests, about
    let currentSort = "newest";
    let searchKeyword = "";

    // Helper: sort bonuses
    function sortBonuses(list, sortType) {
        const copy = [...list];
        if (sortType === "oldest") return copy.sort((a,b) => new Date(a.date) - new Date(b.date));
        if (sortType === "newest") return copy.sort((a,b) => new Date(b.date) - new Date(a.date));
        if (sortType === "highest") return copy.sort((a,b) => b.rating - a.rating);
        if (sortType === "popular") return copy.sort((a,b) => b.popularity - a.popularity);
        return copy;
    }

    function filterBySearch(list, term) {
        if (!term.trim()) return list;
        const lowerTerm = term.toLowerCase();
        return list.filter(item => item.name.toLowerCase().includes(lowerTerm) || item.broker.toLowerCase().includes(lowerTerm));
    }

    function getCurrentBonuses() {
        if (activeTab === "about") return [];
        return dataStore[activeTab]
