<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ForexBonusWhale 🐋</title>
    <style>
        :root { --gold: #e5b300; --bg: #0a0f18; --card: #131a26; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        nav { padding: 20px 5%; background: #000; display: flex; gap: 20px; border-bottom: 2px solid var(--gold); }
        .tab-btn { color: #fff; cursor: pointer; padding: 10px; background: none; border: none; }
        
        .content-section { display: none; padding: 40px 5%; }
        .active-section { display: block; }
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 15px; }
        .stars { color: var(--gold); }
    </style>
</head>
<body>

<nav>
    <div style="color: var(--gold); font-weight: bold;">ForexBonusWhale 🐋</div>
    <button class="tab-btn" onclick="showSection('no-deposit')">No Deposit Bonus</button>
    <button class="tab-btn" onclick="showSection('deposit')">Bonus Deposit</button>
    <button class="tab-btn" onclick="showSection('contests')">Contests</button>
</nav>

<div id="no-deposit" class="content-section active-section">
    <h1>No Deposit Bonuses</h1>
    <div class="filter-bar">
        <button onclick="sortData('Popularity')">Popularity</button>
        <button onclick="sortData('Rating')">Rating</button>
        <button onclick="sortData('Newest')">Newest</button>
    </div>
    
    <div class="card">
        <h3>Ryvotrade <span>⋮</span></h3>
        <p>Bonus: $100</p>
        <div class="stars">★★★★★</div>
        <div class="review">
            <strong>Ali:</strong> "Best experience ever!"
        </div>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
    }
    function sortData(criteria) {
        alert("Filtering by: " + criteria);
        // لێرەدا کۆدی سۆرتکردنی داتاکان زیاد دەکرێت
    }
</script>
</body>
</html>
