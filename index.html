<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ForexBonusWhale | نەهەنگی بۆنەسەکانی فۆرێکس</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0808;
            font-family: 'Inter', 'Cairo', sans-serif;
            color: #e0d9cf;
            line-height: 1.5;
        }

        /* Dark / Gold Theme */
        :root {
            --bg-dark: #0a0808;
            --bg-card: #151210;
            --bg-elevated: #1e1b17;
            --gold-primary: #e4b363;
            --gold-dark: #b8860b;
            --gold-glow: rgba(228, 179, 99, 0.2);
            --text-light: #f5f0e8;
            --text-muted: #aaa39a;
            --border-gold: rgba(228, 179, 99, 0.3);
            --danger: #b34b4b;
            --success: #4b9e6e;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1612;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
            border-radius: 6px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* header & nav */
        .main-header {
            padding: 20px 0;
            border-bottom: 2px solid var(--border-gold);
            background: rgba(10, 8, 8, 0.95);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f3d382, #b67b1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 1.2rem;
            background: none;
            color: var(--gold-primary);
        }

        .search-container {
            flex: 1;
            max-width: 380px;
        }
        .search-box {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 60px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .search-box:focus-within {
            border-color: var(--gold-primary);
            box-shadow: 0 0 8px var(--gold-glow);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: var(--text-light);
            font-size: 0.9rem;
            outline: none;
        }
        .search-box button {
            background: var(--gold-primary);
            border: none;
            padding: 0 20px;
            color: #1a120b;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #ffcd7e;
        }

        /* main navigation tabs */
        .tabs-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid rgba(228, 179, 99, 0.3);
            padding-bottom: 10px;
            margin-top: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 26px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
            font-family: inherit;
        }
        .tab-btn i {
            margin-right: 8px;
        }
        .tab-btn.active {
            background: var(--gold-primary);
            color: #0a0808;
            box-shadow: 0 2px 12px rgba(228, 179, 99, 0.3);
        }
        .tab-btn:hover:not(.active) {
            color: var(--gold-primary);
            background: rgba(228, 179, 99, 0.1);
        }

        /* filters row */
        .filters-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin: 30px 0 20px;
            gap: 15px;
        }
        .sort-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .sort-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .sort-btn.active-sort {
            background: var(--gold-primary);
            color: #0a0808;
            border-color: var(--gold-primary);
        }
        .sort-btn:hover {
            border-color: var(--gold-primary);
            color: var(--gold-primary);
        }

        /* bonus grid */
        .bonus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            margin: 30px 0 50px;
        }
        .bonus-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .bonus-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.7);
            border-color: var(--gold-primary);
        }
        .card-header {
            padding: 20px 20px 12px;
            border-bottom: 1px dashed rgba(228,179,99,0.2);
        }
        .bonus-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold-primary);
            margin-bottom: 8px;
        }
        .bonus-broker {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .rating-stars {
            color: var(--gold-primary);
            letter-spacing: 2px;
            font-size: 0.9rem;
        }
        .card-body {
            padding: 14px 20px;
        }
        .bonus-desc {
            font-size: 0.85rem;
            color: #bbb3a4;
            margin: 8px 0;
        }
        .bonus-badge {
            background: rgba(228,179,99,0.15);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--gold-primary);
        }
        .card-footer {
            padding: 12px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(228,179,99,0.15);
        }
        .btn-details {
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-details:hover {
            background: var(--gold-primary);
            color: #0a0808;
        }

        /* modal for bonus detail + review */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        .modal-content {
            background: var(--bg-elevated);
            max-width: 750px;
            width: 90%;
            margin: 30px auto;
            border-radius: 32px;
            border: 1px solid var(--gold-primary);
            padding: 30px;
            position: relative;
            animation: fadeUp 0.2s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .modal-close {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .modal-close:hover {
            color: var(--gold-primary);
        }
        .bonus-rules {
            background: #0f0d0b;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            border-left: 4px solid var(--gold-primary);
        }
        .review-section {
            margin-top: 35px;
            border-top: 1px solid var(--border-gold);
            padding-top: 25px;
        }
        .review-item {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 16px;
        }
        .review-user {
            font-weight: bold;
            color: var(--gold-primary);
        }
        .review-stars {
            margin: 5px 0;
        }
        .review-comment {
            color: #ccc3b6;
            font-size: 0.9rem;
        }
        .add-review {
            margin-top: 20px;
            background: #1f1b17;
            border-radius: 24px;
            padding: 18px;
        }
        .add-review input, .add-review textarea, .add-review select {
            width: 100%;
            background: #2a2520;
            border: 1px solid var(--border-gold);
            padding: 12px;
            border-radius: 20px;
            color: white;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .stars-select {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            cursor: pointer;
        }
        .star-rating i {
            font-size: 24px;
            color: #4a423a;
            transition: 0.1s;
        }
        .star-rating i.active-star {
            color: var(--gold-primary);
        }
        .submit-review {
            background: var(--gold-primary);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: #0a0808;
            cursor: pointer;
        }

        /* about page specific */
        .about-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            margin: 40px 0;
            border: 1px solid var(--border-gold);
        }
        .disclaimer {
            background: rgba(179, 75, 75, 0.15);
            border-left: 5px solid var(--danger);
            padding: 20px;
            border-radius: 20px;
            margin: 25px 0;
            color: #f0cece;
        }
        footer {
            text-align: center;
            padding: 40px 0 30px;
            border-top: 1px solid var(--border-gold);
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        @media (max-width: 700px) {
            .container { padding: 0 16px; }
            .tab-btn { padding: 8px 16px; font-size: 0.8rem; }
            .bonus-name { font-size: 1.2rem; }
        }
        .no-results {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="logo-area">
                <div class="logo">FOREXBONUSWHALE <span>🐋</span></div>
                <div class="search-container">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="گەڕان بەناوی بۆنەس یان broker ...">
                        <button id="searchBtn"><i class="fas fa-search"></i></button>
                    </div>
                </div>
            </div>
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="nodb"><i class="fas fa-gift"></i> No Deposit Bonus</button>
                <button class="tab-btn" data-tab="deposit"><i class="fas fa-coins"></i> Bonus Deposit</button>
                <button class="tab-btn" data-tab="contests"><i class="fas fa-trophy"></i> Contests</button>
                <button class="tab-btn" data-tab="about"><i class="fas fa-info-circle"></i> About</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- filters + sort section (only shown for bonus tabs) -->
        <div id="filtersArea" class="filters-row">
            <div class="sort-buttons" id="sortGroup">
                <button class="sort-btn" data-sort="oldest">📅 Oldest</button>
                <button class="sort-btn" data-sort="newest">✨ Newest</button>
                <button class="sort-btn" data-sort="highest">⭐ Highest rated</button>
                <button class="sort-btn" data-sort="popular">🔥 Most popular</button>
            </div>
            <div id="resultCount" class="result-count"></div>
        </div>

        <!-- dynamic content: bonus grids or about -->
        <div id="dynamicContent"></div>
    </main>

    <footer>
        <p>⚠️ تەنیا بۆ ئاگاداری | مەترسی لە بازرگانی هەیە | <i class="fas fa-shield-alt"></i> هۆشیار بن</p>
        <p>© 2025 ForexBonusWhale — ڕێنمایی و پێداچوونەوەی بۆنەسەکان</p>
    </footer>

    <!-- Modal for details + reviews -->
    <div id="bonusModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalDynamicContent"></div>
        </div>
    </div>

    <script>
        // ------------------------------
        // 1. GENERATE 20 BONUSES PER CATEGORY (mock data)
        // ------------------------------
        const bonusNames = [
            "Whale Welcome", "Golden Gainer", "Crypto Surge", "Forex Storm", "Elite Trader", "Desert Eagle", "Lucky 7 Spins", 
            "Whale No Deposit", "VIP Gold", "Phantom Bonus", "Thunder Lever", "Mega Cashback", "Starlight 50", "Prestige 30",
            "Whale Hunter", "FX Freedom", "Platinum Edge", "Dragon Bonus", "Galaxy Rewards", "Infinite Boost"
        ];
        const brokersList = ["FTMO", "IC Markets", "Pepperstone", "eToro", "XM", "Exness", "Axiory", "Admiral Markets", "OctaFX", "FXTM"];

        function randomBetween(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        function randomRating() {
            let base = (Math.random() * 3.5 + 1.5).toFixed(1);
            return parseFloat(base);
        }

        function generateBonuses(categoryPrefix, count = 20) {
            let arr = [];
            for (let i = 1; i <= count; i++) {
                let name = `${categoryPrefix} ${bonusNames[i % bonusNames.length]} ${i}`;
                let broker = brokersList[Math.floor(Math.random() * brokersList.length)];
                let rating = randomRating();
                let reviewsCount = randomBetween(3, 280);
                let popularity = randomBetween(10, 999); // higher more popular
                let dateAdded = new Date(Date.now() - randomBetween(0, 365*2) * 24 * 60 * 60 * 1000);
                let description = `بۆنەسی ${categoryPrefix} بە بڕی ${randomBetween(10, 500)}$ یان ${randomBetween(5, 100)}% سپین. شەرتی ${randomBetween(5,40)}x پێویستە.`;
                let terms = `📜 یاسا: بۆنەسەکە بۆ هەژمارە نوێکانە، ماوەی ${randomBetween(7,30)} ڕۆژ. مەرجی قەبارە و وێجەر ${randomBetween(10,45)}x. پێویستە بەبێ ئەلیپس وەربگرێت.`;
                arr.push({
                    id: `${categoryPrefix}_${i}`,
                    name: name,
                    broker: broker,
                    rating: rating,
                    reviews: reviewsCount,
                    popularity: popularity,
                    date: dateAdded,
                    description: description,
                    terms: terms,
                    category: categoryPrefix,
                    comments: [] // each bonus will have its own reviews
                });
            }
            // pre-populate some mock reviews
            arr.forEach(bonus => {
                let sampleReviews = [
                    { user: "TraderAli", stars: 5, comment: "بۆنەسی باش بوو، زۆر سوودم بینی" },
                    { user: "ForexKurd", stars: 4, comment: "ڕێک و پێک، بەڵام وێجەر زۆر بوو" },
                    { user: "WhaleHunter", stars: 4.5, comment: "خێرا وەرمگرت، پاڵپشتی باش" }
                ];
                bonus.comments = sampleReviews.slice(0, randomBetween(1, 3));
            });
            return arr;
        }

        // Build real data: 3 categories, each 20 bonuses
        let noDepositBonuses = generateBonuses("NoDeposit", 20);
        let depositBonuses = generateBonuses("Deposit", 20);
        let contestsBonuses = generateBonuses("Contest", 20);

        let allBonusData = {
            nodb: noDepositBonuses,
            deposit: depositBonuses,
            contests: contestsBonuses
        };

        let activeTab = "nodb";     // nodb, deposit, contests, about
        let currentSort = "newest";
        let searchTerm = "";

        // Helper: sort bonuses array
        function sortBonuses(bonuses, sortType) {
            let copy = [...bonuses];
            if (sortType === "oldest") return copy.sort((a,b) => new Date(a.date) - new Date(b.date));
            if (sortType === "newest") return copy.sort((a,b) => new Date(b.date) - new Date(a.date));
            if (sortType === "highest") return copy.sort((a,b) => b.rating - a.rating);
            if (sortType === "popular") return copy.sort((a,b) => b.popularity - a.popularity);
            return copy;
        }

        function filterBySearch(bonuses, term) {
            if (!term.trim()) return bonuses;
            term = term.toLowerCase();
            return bonuses.filter(b => b.name.toLowerCase().includes(term) || b.broker.toLowerCase().includes(term));
        }

        function getFilteredAndSorted(categoryKey) {
            let bonuses = allBonusData[categoryKey] || [];
            let filtered = filterBySearch(bonuses, searchTerm);
            return sortBonuses(filtered, currentSort);
        }

        // render bonus cards
        function renderBonuses(categoryKey) {
            const container = document.getElementById("dynamicContent");
            const filteredSorted = getFilteredAndSorted(categoryKey);
            const resultCountSpan = document.getElementById("resultCount");
            if(resultCountSpan) resultCountSpan.innerText = `${filteredSorted.length} بۆنەس`;

            if (filteredSorted.length === 0) {
                container.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> هیچ بۆنەسێک نەدۆزرایەوە</div>`;
                return;
            }

            let html = `<div class="bonus-grid">`;
