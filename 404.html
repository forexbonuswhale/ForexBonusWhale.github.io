<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ForexBonusWhale</title>
  <script>
    // GitHub Pages SPA routing — redirects unknown paths back to index.html
    // with the original path encoded as a query parameter.
    //
    // pathSegmentsToKeep = 0  →  root domain  (forexbonuswhale.github.io)
    // pathSegmentsToKeep = 1  →  project page (username.github.io/repo-name)
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
      '/?p=' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      (l.hash   ? '&h=' + encodeURIComponent(l.hash) : '')
    );
  </script>
</head>
<body></body>
</html>
