<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel – Broker Bonus Manager</title>
<style>
  /* ── دیزاینە ئەسڵییەکەی خۆت ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: #2a2a2a;
    --accent: #f0b429;
    --accent2: #e53e3e;
    --accent3: #38a169;
    --text: #f0f0f0;
    --muted: #888;
    --input-bg: #1e1e1e;
    --radius: 8px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }
  /* ── شاشەی چوونە ژوورەوە ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .login-box {
    background: var(--surface); padding: 2rem; border-radius: var(--radius);
    border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;
  }
  input {
    width: 100%; padding: 0.8rem; margin: 0.8rem 0; background: var(--input-bg);
    border: 1px solid var(--border); color: white; border-radius: var(--radius);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent3); color: white; border: none; padding: 0.8rem 1.5rem;
    border-radius: var(--radius); cursor: pointer; font-weight: bold; width: 100%;
    margin-top: 10px; transition: 0.2s;
  }
  button:hover { opacity: 0.9; }
  .btn-danger { background: var(--accent2); }
  .btn-warning { background: var(--accent); color: black; }
  
  /* ── ئەپلیکەیشن ── */
  #app { display: none; padding: 2rem; max-width: 800px; margin: 0 auto; }
  .panel { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 2rem; }
  .broker-card {
    background: var(--card); border: 1px solid var(--border); padding: 1rem;
    margin-bottom: 1rem; border-radius: var(--radius); display: flex;
    justify-content: space-between; align-items: center;
  }
  .broker-info h3 { color: var(--accent); margin-bottom: 5px; }
  .toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--accent3);
    color: white; padding: 1rem; border-radius: var(--radius); display: none; font-weight: bold;
  }
  .toast.error { background: var(--accent2); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2 style="color: var(--accent); margin-bottom: 1rem;">Admin Login</h2>
    <input type="password" id="admin-pass" placeholder="پاسوۆرد بنووسە..." />
    <button onclick="checkLogin()">چوونە ژوورەوە</button>
  </div>
</div>

<div id="app">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1 style="color: var(--accent)">Admin Dashboard</h1>
    <button onclick="location.reload()" class="btn-danger" style="width: auto;">چوونە دەرەوە</button>
  </div>
  
  <div class="panel">
    <h2 style="margin-bottom: 1rem; color: var(--accent)">زیادکردنی برۆکەری نوێ</h2>
    <input type="text" id="b-name" placeholder="ناوی برۆکەر (Name)" />
    <input type="text" id="b-bonus" placeholder="بۆنوس (Bonus - نموونە: $50 No Deposit)" />
    <input type="text" id="b-logo" placeholder="لینکی لۆگۆ (Logo URL)" />
    <input type="text" id="b-link" placeholder="لینکی برۆکەر (Affiliate Link)" />
    <button onclick="addBroker()">+ زیادکردنی برۆکەر لە لیستەکە</button>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
     <h2>لیستی برۆکەرەکان</h2>
     <button onclick="saveToDatabase()" class="btn-warning" style="width: auto;" id="save-btn">💾 پاشەکەوتکردن لە داتابەیس</button>
  </div>
  
  <div id="loading" style="color: var(--accent); margin-bottom: 1rem;">چاوەڕێ بکە، داتاکان باردەکرێن...</div>
  <div id="brokers-list"></div>
</div>

<div id="toast" class="toast">نامە</div>

<script>
  // ── زانیارییەکانی داتابەیسەکەت کە خۆت ناردت ──
  const BIN_URL = "https://api.jsonbin.io/v3/b/6a1c439421f9ee59d2a15141";
  const MASTER_KEY = "$2a$10$RL81W7BYP2jUPfZN5PvlDud.mRWPX1Hc3Hvdos/IRXJdtokrTc4te";
  let brokersData = [];

  // ── داخڵبوون ──
  function checkLogin() {
    const pass = document.getElementById('admin-pass').value;
    if(pass === 'Admin2026') { // پاسوۆردە نوێیەکە
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadBrokers();
    } else {
      showToast('پاسوۆردەکە هەڵەیە، تکایە دووبارە هەوڵبدەرەوە!', true);
    }
  }

  // ── خوێندنەوەی داتا لە ئینتەرنێتەوە ──
  async function loadBrokers() {
    document.getElementById('loading').style.display = 'block';
    try {
      const res = await fetch(BIN_URL, { headers: { "X-Master-Key": MASTER_KEY } });
      const data = await res.json();
      brokersData = data.record || [];
      renderBrokers();
    } catch(e) {
      showToast('کێشەیەک هەیە لە هێنانی داتاکان!', true);
    }
    document.getElementById('loading').style.display = 'none';
  }

  // ── نیشاندانی برۆکەرەکان لەسەر شاشە ──
  function renderBrokers() {
    const list = document.getElementById('brokers-list');
    list.innerHTML = '';
    if(brokersData.length === 0) {
        list.innerHTML = '<p style="color: var(--muted)">هیچ برۆکەرێک بوونی نییە.</p>';
        return;
    }
    brokersData.forEach((b, i) => {
      list.innerHTML += `
        <div class="broker-card">
          <div class="broker-info">
            <h3>${b.name || 'بێ ناو'}</h3>
            <p style="color: var(--muted)">${b.bonus || 'بێ بۆنۆس'}</p>
          </div>
          <button class="btn-danger" style="width: auto; padding: 0.5rem 1rem;" onclick="deleteBroker(${i})">سڕینەوە</button>
        </div>
      `;
    });
  }

  // ── زیادکردنی برۆکەر بۆ لیستەکە ──
  function addBroker() {
    const name = document.getElementById('b-name').value.trim();
    const bonus = document.getElementById('b-bonus').value.trim();
    const logo = document.getElementById('b-logo').value.trim();
    const link = document.getElementById('b-link').value.trim();
    
    if(!name) return showToast('تکایە ناوی برۆکەرەکە بنووسە', true);
    
    brokersData.push({ name, bonus, logo, link });
    renderBrokers();
    showToast('برۆکەرەکە خرایە لیستەکەوە، تکایە کلیک لە (پاشەکەوتکردن) بکە!');
    
    // پاککردنەوەی بۆکسەکان
    document.getElementById('b-name').value = '';
    document.getElementById('b-bonus').value = '';
    document.getElementById('b-logo').value = '';
    document.getElementById('b-link').value = '';
  }

  // ── سڕینەوەی برۆکەر ──
  function deleteBroker(index) {
    if(confirm('دڵنیای لە سڕینەوەی ئەم برۆکەرە؟')) {
      brokersData.splice(index, 1);
      renderBrokers();
      showToast('سڕایەوە، تکایە کلیک لە (پاشەکەوتکردن) بکە!');
    }
  }

  // ── ناردنی داتاکان بۆ داتابەیسە ئۆنلاینەکە ──
  async function saveToDatabase() {
    const btn = document.getElementById('save-btn');
    btn.innerText = 'خەریکە پاشەکەوت دەبێت...';
    try {
      const res = await fetch(BIN_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': MASTER_KEY
        },
        body: JSON.stringify(brokersData)
      });
      if(res.ok) {
        showToast('داتاکان بە سەرکەوتوویی پاشەکەوت کران! 💾');
      } else {
        showToast('کێشەیەک ڕوویدا لە پاشەکەوتکردن!', true);
      }
    } catch(e) {
      showToast('خەتای هێڵی ئینتەرنێت هەیە!', true);
    }
    btn.innerText = '💾 پاشەکەوتکردن لە داتابەیس';
  }

  // ── نامەی ئاگادارکردنەوە خوارەوە ──
  let toastTimer;
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isError ? 'toast error' : 'toast';
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.style.display = 'none', 4000);
  }
</script>
</body>
</html>
