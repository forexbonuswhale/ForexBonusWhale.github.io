<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForexBonusWhale - Admin Panel</title>
    <!-- Tailwind CSS بۆ دیزاینێکی مۆدێرن و ڕێکخراو -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">

    <!-- 🔐 بەشی داخڵبوون (Login Section) -->
    <div id="login-section" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-slate-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-center text-emerald-400">Admin Login</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password-input" class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-emerald-500 text-white">
                <p id="login-error" class="text-red-500 text-sm mt-2 hidden">تکایە دڵنیابەوە کە پاسوۆردەکە ڕاستە!</p>
            </div>
            <button onclick="checkLogin()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded transition duration-200">چوونە ژوورەوە</button>
        </div>
    </div>

    <!-- 📊 بەشی کۆنترۆڵکردنی برۆکەرەکان (Admin Dashboard) -->
    <div id="admin-section" class="hidden max-w-4xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-emerald-400">Admin Dashboard</h1>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-medium transition">چوونە دەرەوە</button>
        </div>

        <!-- فۆرمی زیادکردنی برۆکەر -->
        <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 mb-8">
            <h2 class="text-xl font-bold mb-4 text-emerald-300">زیادکردنی برۆکەری نوێ</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">ناوی برۆکەر (Name)</label>
                    <input type="text" id="b-name" class="w-full p-2 rounded bg-slate-700 border border-slate-600 text-white">
                </div>
                <div>
                    <label class="block text-sm mb-1">بۆنوس (Bonus)</label>
                    <input type="text" id="b-bonus" class="w-full p-2 rounded bg-slate-700 border border-slate-600 text-white">
                </div>
                <div>
                    <label class="block text-sm mb-1">لینکی لۆگۆ (Logo URL)</label>
                    <input type="text" id="b-logo" class="w-full p-2 rounded bg-slate-700 border border-slate-600 text-white" placeholder="https://...">
                </div>
                <div>
                    <label class="block text-sm mb-1">لینکی ناونوسین (Affiliate Link)</label>
                    <input type="text" id="b-link" class="w-full p-2 rounded bg-slate-700 border border-slate-600 text-white" placeholder="https://...">
                </div>
            </div>
            <button onclick="addBroker()" class="mt-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded transition">زیادکردن لە لیستەکە</button>
        </div>

        <!-- لیستی برۆکەرەکان -->
        <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-emerald-300">لیستی برۆکەرەکان</h2>
                <button onclick="saveToDatabase()" id="save-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded transition">پاشەکەوتکردن لە داتابەیس 💾</button>
            </div>
            <div id="loading-status" class="text-yellow-400 my-4">باردەکرێت...</div>
            <div id="brokers-list" class="space-y-3">
                <!-- داتاکان لێرەدا بە داینامیکی دروست دەبن -->
            </div>
        </div>
    </div>

    <script>
        const BIN_URL = "https://api.jsonbin.io/v3/b/6a1c439421f9ee59d2a15141";
        const MASTER_KEY = "$2a$10$RL81W7BYP2jUPfZN5PvlDud.mRWPX1Hc3Hvdos/IRXJdtokrTc4te";
        let brokersData = [];

        // پشکنینی دۆخی چوونەژوورەوەی پێشوو
        if (localStorage.getItem("admin_logged") === "true") {
            showAdmin();
        }

        function checkLogin() {
            const pass = document.getElementById("password-input").value;
            if (pass === "Whale0000") {
                localStorage.setItem("admin_logged", "true");
                document.getElementById("login-error").classList.add("hidden");
                showAdmin();
            } else {
                document.getElementById("login-error").classList.remove("hidden");
            }
        }

        function logout() {
            localStorage.removeItem("admin_logged");
            location.reload();
        }

        function showAdmin() {
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("admin-section").classList.remove("hidden");
            fetchBrokers();
        }

        async function fetchBrokers() {
            const status = document.getElementById("loading-status");
            try {
                const res = await fetch(BIN_URL, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const data = await res.json();
                brokersData = data.record || [];
                status.classList.add("hidden");
                renderBrokers();
            } catch (err) {
                status.innerText = "خەتایەک ڕوویدا لە کاتی هێنانی داتاکان!";
                console.error(err);
            }
        }

        function renderBrokers() {
            const container = document.getElementById("brokers-list");
            container.innerHTML = "";
            if (brokersData.length === 0) {
                container.innerHTML = "<p class='text-slate-400'>هیچ برۆکەرێک لە داتابەیسدا نییە.</p>";
                return;
            }
            brokersData.forEach((broker, index) => {
                container.innerHTML += `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 bg-slate-700 rounded border border-slate-600 gap-2">
                        <div class="flex items-center gap-4">
                            ${broker.logo ? `<img src="${broker.logo}" class="w-10 h-10 object-contain rounded bg-white p-1" onerror="this.src='https://via.placeholder.com/40'">` : ''}
                            <div>
                                <h3 class="font-bold text-lg">${broker.name || 'بێ ناو'}</h3>
                                <p class="text-sm text-emerald-400">${broker.bonus || 'بێ بۆنۆس'}</p>
                            </div>
                        </div>
                        <button onclick="deleteBroker(${index})" class="bg-red-500 hover:bg-red-600 text-white text-sm px-3 py-1 rounded transition">سڕینەوە</button>
                    </div>
                `;
            });
        }

        function addBroker() {
            const name = document.getElementById("b-name").value.trim();
            const bonus = document.getElementById("b-bonus").value.trim();
            const logo = document.getElementById("b-logo").value.trim();
            const link = document.getElementById("b-link").value.trim();

            if (!name) {
                alert("تکایە ناوی برۆکەر بنووسە");
                return;
            }

            brokersData.push({ name, bonus, logo, link });
            renderBrokers();

            // پاککردنەوەی ئینپوتەکان
            document.getElementById("b-name").value = "";
            document.getElementById("b-bonus").value = "";
            document.getElementById("b-logo").value = "";
            document.getElementById("b-link").value = "";
        }

        function deleteBroker(index) {
            if (confirm("دڵنیای لە سڕینەوەی ئەم برۆکەرە؟")) {
                brokersData.splice(index, 1);
                renderBrokers();
            }
        }

        async function saveToDatabase() {
            const btn = document.getElementById("save-btn");
            btn.innerText = "خەریکە پاشەکەوت دەبێت...";
            btn.disabled = true;

            try {
                const res = await fetch(BIN_URL, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": MASTER_KEY
                    },
                    body: JSON.stringify(brokersData)
                });
                if (res.ok) {
                    alert("داتاکان بە سەرکەوتوویی پاشەکەوت کران و چوونە سەر سایتی سەرەکی! 🎉");
                } else {
                    alert("کێشەیەک ڕوویدا لە پاشەکەوتکردندا!");
                }
            } catch (err) {
                alert("خەتای هێڵ هەیە، نەتوانرا بنێردرێت!");
                console.error(err);
            } finally {
                btn.innerText = "پاشەکەوتکردن لە داتابەیس 💾";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
