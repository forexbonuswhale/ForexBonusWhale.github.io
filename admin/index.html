<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForexBonusWhale — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- بەکارهێنانی Tailwind CSS بۆ دیزاینێکی خێرا و مۆدێرن -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkBg: '#0f172a',
            darkCard: '#1e293b',
            accent: '#3b82f6'
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .hidden-panel { display: none !important; }
  </style>
</head>
<body class="bg-darkBg text-slate-200 min-h-screen">

  <!-- ================= SECTION 1: LOGIN FORM ================= -->
  <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-darkCard p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-800">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-white mb-2">ForexBonusWhale</h1>
        <p class="text-sm text-slate-400">تکایە وشەی ڕنهێنی ئەدمین بنووسە بۆ چوونەژوورەوە</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
          <input type="password" id="adminPassword" required 
                 class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-accent text-center tracking-widest"
                 placeholder="••••••••">
        </div>
        <p id="loginError" class="text-red-500 text-xs mb-4 hidden">وشەی ڕنهێنی هەڵەیە!</p>
        <button type="submit" class="w-full bg-accent hover:bg-blue-600 text-white font-medium py-2.5 rounded-lg transition duration-200">
          چوونەژوورەوە
        </button>
      </form>
    </div>
  </div>

  <!-- ================= SECTION 2: MAIN ADMIN PANEL ================= -->
  <div id="adminPanel" class="hidden-panel max-w-7xl mx-auto px-4 py-8">
    
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-800 pb-6 mb-8">
      <div>
        <h1 class="text-3xl font-extrabold text-white">Dashboard — Bonuses Panel</h1>
        <p class="text-slate-400 mt-1">بەرێوەبردنی بۆنوسەکانی فایەربەیس (Realtime Database)</p>
      </div>
      <button onclick="handleLogout()" class="mt-4 md:mt-0 bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
        چوونەدەرەوە (Logout)
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- COLUMN 1: ADD NEW BONUS FORM -->
      <div class="lg:col-span-1">
        <div class="bg-darkCard p-6 rounded-2xl border border-slate-800 shadow-lg sticky top-6">
          <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-accent rounded"></span> زیادکردنی بۆنوسی نوێ
          </h2>
          
          <form id="bonusForm" onsubmit="saveBonus(event)" class="space-y-4 text-sm">
            
            <div>
              <label class="block text-slate-400 mb-1">Broker Name (ناوی برۆکەر)</label>
              <input type="text" id="brokerName" required placeholder="وەکو: IC Markets" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
            </div>

            <div>
              <label class="block text-slate-400 mb-1">Title (ناونیشانی بۆنوسەکە)</label>
              <input type="text" id="title" required placeholder="وەکو: 100% Deposit Match Bonus" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-slate-400 mb-1">Amount (ڕێژە)</label>
                <input type="text" id="amount" required placeholder="100% یان $50" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
              </div>
              <div>
                <label class="block text-slate-400 mb-1">Type (جۆر)</label>
                <select id="type" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
                  <option value="deposit">deposit</option>
                  <option value="no-deposit">no-deposit</option>
                  <option value="contest">contest</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-slate-400 mb-1">Min Deposit</label>
                <input type="text" id="minDeposit" required placeholder="$200" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
              </div>
              <div>
                <label class="block text-slate-400 mb-1">Max Bonus</label>
                <input type="text" id="maxBonus" required placeholder="$1,000" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-slate-400 mb-1">Rating (1.0 بۆ 5.0)</label>
                <input type="number" id="rating" step="0.1" min="1" max="5" required placeholder="4.6" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
              </div>
              <div>
                <label class="block text-slate-400 mb-1">Reviews Count</label>
                <input type="number" id="reviews" required placeholder="980" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-slate-400 mb-1">Country (وڵات)</label>
                <input type="text" id="country" required placeholder="Australia" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
              </div>
              <div>
                <label class="block text-slate-400 mb-1">Regulation (یاسایی)</label>
                <input type="text" id="regulation" required placeholder="ASIC, CySEC" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
              </div>
            </div>

            <div>
              <label class="block text-slate-400 mb-1">Claim URL (لینکی وەرگرتنی بۆنوس)</label>
              <input type="url" id="claimUrl" required placeholder="https://icmarkets.com" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
            </div>

            <div>
              <label class="block text-slate-400 mb-1">Description (شیکردنەوە)</label>
              <textarea id="description" rows="2" required placeholder="شیکردنەوەی بۆنوسەکە لێرە بنووسە..." class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none"></textarea>
            </div>

            <div>
              <label class="block text-slate-400 mb-1">Requirements (مەرجەکان)</label>
              <input type="text" id="requirements" required placeholder="Min deposit $200. 1 lot per $10 bonus..." class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:border-accent focus:outline-none">
            </div>

            <div class="grid grid-cols-3 gap-2 pt-2">
              <label class="flex items-center gap-2 cursor-pointer bg-slate-950 p-2 rounded border border-slate-800">
                <input type="checkbox" id="isActive" checked class="rounded text-accent focus:ring-0">
                <span>Active</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer bg-slate-950 p-2 rounded border border-slate-800">
                <input type="checkbox" id="isPopular" class="rounded text-accent focus:ring-0">
                <span>Popular</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer bg-slate-950 p-2 rounded border border-slate-800">
                <input type="checkbox" id="isVerified" class="rounded text-accent focus:ring-0">
                <span>Verified</span>
              </label>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition mt-4">
              خەزنکردن لە فایەربەیس 💾
            </button>
          </form>

        </div>
      </div>

      <!-- COLUMN 2: CURRENT BONUSES LIST (TABLE) -->
      <div class="lg:col-span-2">
        <div class="bg-darkCard p-6 rounded-2xl border border-slate-800 shadow-lg">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-white flex items-center gap-2">
              <span class="w-2 h-6 bg-emerald-500 rounded"></span> لیستی بۆنوسەکان لە فایەربەیس
            </h2>
            <span id="loadingText" class="text-sm text-yellow-500 animate-pulse">خەریکە داتاکان دێنێت...</span>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm border-collapse">
              <thead>
                <tr class="border-b border-slate-800 text-slate-400 font-medium">
                  <th class="py-3 px-4">Broker</th>
                  <th class="py-3 px-4">Title</th>
                  <th class="py-3 px-4">Amount</th>
                  <th class="py-3 px-4">Type</th>
                  <th class="py-3 px-4 text-center">Actions</th>
                </tr>
              </thead>
              <tbody id="bonusesTableBody" class="divide-y divide-slate-800 text-slate-300">
                <!-- داتاکان لێرە بە جافاسکریت دێنە خوارەوە -->
              </tbody>
            </table>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- ================= FIREBASE MODULES & SCRIPTS ================= -->
  <!-- هێنانی Firebase SDK لە ڕێگەی CDN -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // رێکخستنی فایەربەیسی تۆ بەپێی ئەو بەستەرەی داتناوە
    const firebaseConfig = {
      databaseURL: "https://froexbonuswhale-default-rtdb.firebaseio.com"
    };

    // ناساندنی ئەپ و داتابەیس
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // گۆڕاوەکان بۆ لۆگین
    const CORRECT_PASSWORD = "Aa567567";

    // فەنکشنی چوونەژوورەوە
    window.handleLogin = function(e) {
      e.preventDefault();
      const passInput = document.getElementById('adminPassword').value;
      const errorText = document.getElementById('loginError');

      if (passInput === CORRECT_PASSWORD) {
        localStorage.setItem('admin_logged_in', 'true');
        showPanel();
      } else {
        errorText.classList.remove('hidden');
      }
    }

    // فەنکشنی چوونەدەرەوە
    window.handleLogout = function() {
      localStorage.removeItem('admin_logged_in');
      location.reload();
    }

    // پشکنینی لۆگین لە کاتی کردنەوەی لاپەڕەکە
    function checkLoginStatus() {
      if (localStorage.getItem('admin_logged_in') === 'true') {
        showPanel();
      }
    }

    function showPanel() {
      document.getElementById('loginSection').classList.add('hidden-panel');
      document.getElementById('adminPanel').classList.remove('hidden-panel');
      loadBonuses();
    }

    // هێنانی داتاکان لە نۆدی 'bonuses' لە فایەربەیس بە شێوازی ڕاستەوخۆ (Realtime)
    function loadBonuses() {
      const bonusesRef = ref(db, 'bonuses');
      onValue(bonusesRef, (snapshot) => {
        const tableBody = document.getElementById('bonusesTableBody');
        const loadingText = document.getElementById('loadingText');
        tableBody.innerHTML = '';
        
        if (snapshot.exists()) {
          const data = snapshot.val();
          
          // گەڕان بەناو هەموو بۆنوسەکاندا
          Object.keys(data).forEach((key) => {
            const item = data[key];
            
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-900/50 transition";
            tr.innerHTML = `
              <td class="py-3 px-4 font-semibold text-white">${item.brokerName || ''}</td>
              <td class="py-3 px-4 text-slate-400">${item.title || ''}</td>
              <td class="py-3 px-4 text-emerald-400 font-medium">${item.amount || ''}</td>
              <td class="py-3 px-4"><span class="px-2 py-0.5 bg-slate-800 rounded text-xs">${item.type || 'deposit'}</span></td>
              <td class="py-3 px-4 text-center">
                <button onclick="deleteBonus('${key}')" class="text-rose-500 hover:text-rose-400 font-medium text-xs bg-rose-500/10 px-2.5 py-1 rounded border border-rose-500/20 transition">
                  سڕینەوە
                </button>
              </td>
            `;
            tableBody.appendChild(tr);
          });
          loadingText.innerText = `تەواو (${Object.keys(data).length} برۆکەر هەیە)`;
          loadingText.className = "text-sm text-emerald-500";
        } else {
          tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-500">هیچ داتایەک لە فایەربەیس نییە!</td></tr>`;
          loadingText.innerText = "هیچ نییە";
          loadingText.className = "text-sm text-slate-500";
        }
      });
    }

    // فەنکشنی خەزنکردنی بۆنوس بە تەواوی مواسەفاتەکانەوە
    window.saveBonus = function(e) {
      e.preventDefault();

      // دروستکردنی کلیلێکی عەشوائی بۆ brokerId و بۆنوسەکە
      const newBonusRef = push(ref(db, 'bonuses'));
      const generatedBrokerId = push(ref(db, 'brokers')).key; // دروستکردنی ناسنامەی برۆکەرەکە بە شێوازی فایەربەیس

      const bonusData = {
        amount: document.getElementById('amount').value,
        brokerId: generatedBrokerId,
        brokerName: document.getElementById('brokerName').value,
        claimUrl: document.getElementById('claimUrl').value,
        country: document.getElementById('country').value,
        createdAt: Date.now(), // کاتی دروستکردن بە میلی چرکە
        description: document.getElementById('description').value,
        howToClaimSteps: [
          "Register a live account with " + document.getElementById('brokerName').value + ".",
          "Verify your identity and address.",
          "Make a minimum deposit of " + document.getElementById('minDeposit').value + ".",
          "The bonus will be automatically credited to your account."
        ],
        isActive: document.getElementById('isActive').checked,
        isPopular: document.getElementById('isPopular').checked,
        isVerified: document.getElementById('isVerified').checked,
        maxBonus: document.getElementById('maxBonus').value,
        minDeposit: document.getElementById('minDeposit').value,
        rating: parseFloat(document.getElementById('rating').value) || 4.5,
        regulation: document.getElementById('regulation').value,
        requirements: document.getElementById('requirements').value,
        reviews: parseInt(document.getElementById('reviews').value) || 0,
        title: document.getElementById('title').value,
        type: document.getElementById('type').value,
        views: Math.floor(Math.random() * (2000 - 500 + 1)) + 500 // ژمارەیەکی عەشوائی بۆ بینینەکان دادەنێت
      };

      // ناردن بۆ فایەربەیس
      set(newBonusRef, bonusData)
        .then(() => {
          alert("بۆنوسەکە بە سەرکەوتوویی لە فایەربەیس خەزنکرا! 🎉");
          document.getElementById('bonusForm').reset();
        })
        .catch((error) => {
          alert("کێشەیەک ڕوویدا لە خەزنکردندا: " + error.message);
        });
    }

    // فەنکشنی سڕینەوە
    window.deleteBonus = function(key) {
      if (confirm("دڵنیای لە سڕینەوەی ئەم بۆنوسە؟")) {
        remove(ref(db, `bonuses/${key}`))
          .then(() => {
            alert("بۆنوسەکە سڕایەوە.");
          })
          .catch((error) => {
            alert("کێشەیەک لە سڕینەوەدا هەیە: " + error.message);
          });
      }
    }

    // دەستپێکردنی پشکنین
    checkLoginStatus();

  </script>
</body>
</html>
