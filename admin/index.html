<!DOCTYPE html>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b111e; color: #ffffff; margin: 0; padding: 20px; }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        .container { background-color: #131c2e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 30px; }
        h2 { color: #fec107; margin-top: 0; text-align: center; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        @media (max-width: 600px) { .full-width { grid-column: span 1; } }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #cbd5e1; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background-color: #1e293b; color: white; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        button { padding: 12px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-success { background-color: #00ca72; color: white; width: 100%; }
        .btn-success:hover { background-color: #00b363; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-danger { background-color: #ef4444; color: white; padding: 6px 12px; font-size: 13px; }
        .btn-edit { background-color: #f59e0b; color: white; padding: 6px 12px; font-size: 13px; margin-right: 5px; }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background-color: #1e293b; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { background-color: #0f172a; color: #fec107; font-weight: 600; }
        tr:hover { background-color: #24334d; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .status-active { background-color: rgba(0, 202, 114, 0.2); color: #00ca72; }
        .status-inactive { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="mainPanel">
        <!-- فۆڕمی زیادکردن و دەستکاریکردن -->
        <div class="container">
            <h2 id="formTitle">Add New Broker</h2>
            <input type="hidden" id="editBrokerId">
            <div class="form-grid">
                <div class="form-group">
                    <label>Broker Name</label>
                    <input type="text" id="bName" placeholder="e.g. Ryvotrade">
                </div>
                <div class="form-group">
                    <label>Bonus Amount</label>
                    <input type="text" id="bAmount" placeholder="e.g. $100 or 100% Bonus">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="bCategory">
                        <option value="no_deposit">No Deposit</option>
                        <option value="deposit">Deposit Bonus</option>
                        <option value="contest">Contest</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="bStatus">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Affiliate Link</label>
                    <input type="url" id="bLink" placeholder="https://...">
                </div>
                <div class="form-group full-width">
                    <label>Rules</label>
                    <textarea id="bRules" placeholder="Enter steps or rules here..."></textarea>
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="saveBtn" class="btn-success" onclick="saveBroker()">Add Broker</button>
                <button id="cancelBtn" class="btn-primary" style="background-color: #64748b; display: none;" onclick="resetForm()">Cancel Edit</button>
            </div>
        </div>

        <!-- لیستی برۆکەرەکان بۆ Edit & Delete -->
        <div class="container">
            <h2>Manage Current Brokers (<span id="brokerCount">0</span>)</h2>
            <div style="text-align: right; margin-bottom: 15px;">
                <button class="btn-primary" onclick="downloadJson()" style="background-color: #00ca72;">📥 Download Updated brokers.json</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Bonus</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="brokerTableBody">
                        <!-- برۆکەرەکان لێرەدا دروست دەبن -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
