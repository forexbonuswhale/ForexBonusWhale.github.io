<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ForexBonusWhale — Admin Panel (Password Only)</title>
  <meta name="description" content="Admin dashboard for Forex broker bonuses - secured with password only">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0A0F1E; }
    .card-glass {
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }
    .btn-primary { background: linear-gradient(105deg, #2563EB, #1E40AF); }
    .btn-primary:hover { background: linear-gradient(105deg, #3B82F6, #2563EB); transform: translateY(-1px); }
    input, textarea, select {
      background-color: #0F172A;
      border: 1px solid #334155;
      color: #F1F5F9;
      border-radius: 12px;
      padding: 10px 14px;
    }
    input:focus, textarea:focus, select:focus { border-color: #3B82F6; outline: none; }
  </style>
</head>
<body class="bg-[#0A0F1E] text-gray-200">
  <div id="appRoot" class="min-h-screen"></div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "firebase/auth";
    import { getDatabase, ref, onValue, push, set, update, remove } from "firebase/database";

    // ========== Firebase Configuration (Replace with YOUR real keys) ==========
    // 🔴 ئەم زانیاریانە لە Firebase Console وەربگرە و جێگەی بکەرەوە
    const firebaseConfig = {
      apiKey: "AIzaSyDummyReplaceWithYourRealApiKey",   // <-- گۆڕی بە ڕاستەقینە
      authDomain: "froexbonuswhale.firebaseapp.com",
      databaseURL: "https://froexbonuswhale-default-rtdb.firebaseio.com",
      projectId: "froexbonuswhale",
      storageBucket: "froexbonuswhale.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:abc123def456"
    };
    // ========================================================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    // State
    let isLoggedIn = false;          // تەنها وشەی نهێنی ڕاست بێت
    let bonusesData = {};
    let editTargetId = null;

    const PASSWORD = "Aa567567";     // وشەی نهێنی ڕاستەقینە

    // Helper to render based on login state
    function render() {
      if (!isLoggedIn) {
        renderLoginScreen();
      } else {
        renderAdminDashboard();
      }
    }

    // ---------- لاپەڕەی چوونە ژوورەوە (تەنها وشەی نهێنی) ----------
    function renderLoginScreen(errorMsg = "") {
      appRoot.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-5">
          <div class="max-w-md w-full card-glass rounded-2xl p-8 border border-gray-700 shadow-2xl">
            <div class="text-center mb-6">
              <div class="text-5xl mb-3">🐋</div>
              <h2 class="text-2xl font-bold text-white">Admin Access</h2>
              <p class="text-gray-400 text-sm mt-1">تەنها بە وشەی نهێنی بچۆ ژوورەوە</p>
              ${errorMsg ? `<div class="mt-3 text-red-400 text-sm bg-red-500/10 p-2 rounded-lg">⚠️ ${errorMsg}</div>` : ""}
            </div>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">وشەی نهێنی (Password)</label>
                <input type="password" id="passwordInput" placeholder="Aa567567" class="w-full" autocomplete="off">
              </div>
              <button id="loginBtn" class="w-full btn-primary py-3 rounded-xl font-semibold text-white transition-all flex items-center justify-center gap-2">
                <i class="fas fa-lock"></i> چوونە ژوورەوە
              </button>
              <div class="relative my-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-700"></div></div>
                <div class="relative flex justify-center text-xs"><span class="bg-[#0F172A] px-3 text-gray-400">یان</span></div>
              </div>
              <button id="googleSigninBtn" class="w-full bg-gray-800 hover:bg-gray-700 py-3 rounded-xl font-medium text-white transition-all flex items-center justify-center gap-2 border border-gray-600">
                <i class="fab fa-google text-red-400"></i> Connect with Google
              </button>
            </div>
            <p class="text-center text-gray-500 text-xs mt-6">🔐 وشەی نهێنی: <strong class="text-cyan-400">Aa567567</strong><br>Firebase Realtime Database + Google Auth</p>
          </div>
        </div>
      `;

      document.getElementById("loginBtn").addEventListener("click", () => {
        const enteredPass = document.getElementById("passwordInput").value;
        if (enteredPass === PASSWORD) {
          isLoggedIn = true;
          render();
        } else {
          renderLoginScreen("وشەی نهێنی هەڵەیە! تکایە Aa567567 داخڵ بکە.");
        }
      });

      document.getElementById("googleSigninBtn").addEventListener("click", async () => {
        try {
          const result = await signInWithPopup(auth, googleProvider);
          if (result.user) {
            // بە سەرکەوتوویی بە گوگڵ چووە ژوورەوە - بەڵام بۆ پارێزگاری کردن، وشەی نهێنی پێویست نییە
            // بەڵام ئێمە دەتوانین بڵێین کە بە گوگڵیش ڕێگە بدرێت
            isLoggedIn = true;
            render();
          }
        } catch (err) {
          renderLoginScreen("هەڵەی گوگڵ: " + err.message);
        }
      });
    }

    // ---------- پانێڵی ئەدمین (بەڕێوەبردنی bonuses) ----------
    function renderAdminDashboard() {
      const bonusesArray = Object.entries(bonusesData).map(([id, val]) => ({ id, ...val }));
      bonusesArray.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

      const html = `
        <div class="max-w-[1600px] mx-auto px-4 py-6">
          <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
            <div>
              <h1 class="text-2xl font-bold"><i class="fas fa-whale text-blue-400"></i> ForexBonusWhale · Admin Console</h1>
              <p class="text-gray-400 text-sm">بەڕێوەبردنی بۆنسەکان - پەیوەست بە Firebase Realtime Database</p>
            </div>
            <div class="flex gap-3">
              <button id="createBonusBtn" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-xl font-medium flex items-center gap-2"><i class="fas fa-plus-circle"></i> بۆنسێکی نوێ</button>
              <button id="logoutBtn" class="bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-xl border border-gray-600"><i class="fas fa-sign-out-alt"></i> دەرچوون</button>
              <button id="viewPublicBtn" class="bg-blue-900/40 hover:bg-blue-800/60 px-5 py-2 rounded-xl"><i class="fas fa-globe"></i> بینینی شوێنی گشتی</button>
            </div>
          </div>

          <div class="card-glass rounded-2xl p-5 overflow-hidden">
            <div class="flex flex-wrap gap-4 justify-between items-center mb-4">
              <h2 class="text-xl font-semibold"><i class="fas fa-gift text-cyan-400"></i> هەموو بۆنسەکان (${bonusesArray.length})</h2>
              <input type="text" id="searchInput" placeholder="فلتەر بە ناوی برۆکەر..." class="px-4 py-2 text-sm w-64 rounded-xl bg-[#0F172A] border border-gray-600">
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left text-sm">
                <thead class="text-gray-400 border-b border-gray-700">
                  <tr><th>برۆکەر</th><th>ناونیشان</th><th>جۆر</th><th>ڕێژە</th><th>چالاکە</th><th>Popular</th><th>Rating</th><th>Claim URL</th><th>کردار</th></tr>
                </thead>
                <tbody id="bonusTableBody">
                  ${bonusesArray.map(b => `
                    <tr class="border-b border-gray-800 hover:bg-white/5">
                      <td class="py-3">${escapeHtml(b.brokerName || '-')}</td>
                      <td>${escapeHtml(b.title || '-')}</td>
                      <td><span class="text-xs px-2 py-1 rounded-full bg-gray-700">${b.type || 'deposit'}</span></td>
                      <td>${b.amount || '-'}</td>
                      <td>${b.isActive ? '<span class="text-green-400"><i class="fas fa-check-circle"></i> Active</span>' : '<span class="text-red-400">Inactive</span>'}</td>
                      <td class="text-center">${b.isPopular ? '<i class="fas fa-star text-amber-400"></i>' : '-'}</td>
                      <td>${b.rating || '4.0'}</td>
                      <td class="max-w-[150px] truncate"><a href="${b.claimUrl || '#'}" target="_blank" class="text-blue-400 text-xs">لینک ↗</a></td>
                      <td class="flex gap-2">
                        <button data-id="${b.id}" class="editBtn text-blue-400 hover:text-blue-300"><i class="fas fa-edit"></i></button>
                        <button data-id="${b.id}" class="deleteBtn text-red-400 hover:text-red-300"><i class="fas fa-trash-alt"></i></button>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
      appRoot.innerHTML = html;

      document.getElementById("createBonusBtn").addEventListener("click", () => openBonusModal());
      document.getElementById("logoutBtn").addEventListener("click", () => {
        isLoggedIn = false;
        signOut(auth); // google sign out if any
        render();
      });
      document.getElementById("viewPublicBtn").addEventListener("click", () => {
        // نمایش بینینی گشتی (تەنها بۆنسە چالاکەکان)
        renderPublicView();
      });
      document.getElementById("searchInput").addEventListener("input", (e) => filterTable(e.target.value));

      document.querySelectorAll(".editBtn").forEach(btn => {
        btn.addEventListener("click", () => openBonusModal(btn.getAttribute("data-id")));
      });
      document.querySelectorAll(".deleteBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          if (confirm("ئایا دڵنیای لە سڕینەوەی ئەم بۆنسە؟")) {
            await remove(ref(db, `bonuses/${id}`));
            fetchBonuses();
          }
        });
      });
    }

    function filterTable(query) {
      const rows = document.querySelectorAll("#bonusTableBody tr");
      const lower = query.toLowerCase();
      rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(lower) ? "" : "none";
      });
    }

    // ---------- نمایش گشتی بۆ بینەران ----------
    function renderPublicView() {
      const activeBonuses = Object.entries(bonusesData)
        .map(([id, val]) => ({ id, ...val }))
        .filter(b => b.isActive !== false)
        .sort((a,b) => (b.isPopular ? 1 : 0) - (a.isPopular ? 1 : 0) || (b.rating || 0) - (a.rating || 0));

      appRoot.innerHTML = `
        <div class="max-w-7xl mx-auto px-4 py-8">
          <div class="flex justify-between items-center mb-8 flex-wrap">
            <div>
              <h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">🐋 ForexBonusWhale</h1>
              <p class="text-gray-400">ڕێبەری سەربەخۆ بۆ باشترین بۆنسەکانی فۆرێکس</p>
            </div>
            <button id="backToAdminBtn" class="mt-4 md:mt-0 px-5 py-2 rounded-xl border border-blue-500/40 text-blue-400 hover:bg-blue-500/20"><i class="fas fa-lock"></i> چوونە ژوورەوەی ئەدمین</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${activeBonuses.map(b => `
              <div class="card-glass rounded-2xl p-5">
                <div class="flex justify-between">
                  <span class="text-xs bg-blue-500/20 px-2 py-1 rounded-full">${b.type === 'deposit' ? '💰 Deposit' : b.type === 'nodeposit' ? '🎁 No Deposit' : '🏆 Contest'}</span>
                  ${b.isPopular ? '<span class="text-xs bg-amber-500/20 text-amber-300 px-2 py-1 rounded-full"><i class="fas fa-star"></i> Popular</span>' : ''}
                </div>
                <h3 class="text-xl font-bold mt-2">${escapeHtml(b.title || b.brokerName)}</h3>
                <p class="text-gray-300 text-sm">${b.brokerName} • ${b.regulation || 'Global'}</p>
                <div class="mt-2 text-2xl font-bold text-cyan-400">${b.amount || '-'}</div>
                <p class="text-gray-400 text-sm mt-2">${b.description || ''}</p>
                <div class="mt-4 flex justify-between items-center">
                  <span class="text-xs">min dep: ${b.minDeposit || '-'}</span>
                  <a href="${b.claimUrl || '#'}" target="_blank" class="text-blue-400 text-sm font-medium">وەرگرتن <i class="fas fa-external-link-alt"></i></a>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      document.getElementById("backToAdminBtn")?.addEventListener("click", () => {
        if (isLoggedIn) {
          renderAdminDashboard();
        } else {
          renderLoginScreen();
        }
      });
    }

    // ---------- مۆدالی دروستکردن / دەستکاریکردن (هەموو فیلدەکان) ----------
    function openBonusModal(bonusId = null) {
      const isEdit = !!bonusId;
      const existing = isEdit ? bonusesData[bonusId] : null;
      const modalDiv = document.createElement("div");
      modalDiv.className = "fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop";
      modalDiv.innerHTML = `
        <div class="bg-[#0F172A] rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto border border-gray-700">
          <div class="sticky top-0 bg-[#0F172A] px-6 py-4 border-b border-gray-700 flex justify-between">
            <h3 class="text-xl font-bold">${isEdit ? "✏️ دەستکاری بۆنس" : "➕ بۆنسێکی نوێ"}</h3>
            <button id="closeModal" class="text-gray-400 text-2xl">&times;</button>
          </div>
          <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label>Broker Name *</label><input id="brokerName" value="${escapeHtml(existing?.brokerName || '')}"></div>
            <div><label>Title *</label><input id="title" value="${escapeHtml(existing?.title || '')}"></div>
            <div><label>Amount (%)</label><input id="amount" value="${escapeHtml(existing?.amount || '100%')}"></div>
            <div><label>Max Bonus</label><input id="maxBonus" value="${escapeHtml(existing?.maxBonus || '$1,000')}"></div>
            <div><label>Min Deposit</label><input id="minDeposit" value="${escapeHtml(existing?.minDeposit || '$200')}"></div>
            <div><label>Rating</label><input id="rating" type="number" step="0.1" value="${existing?.rating || 4.5}"></div>
            <div><label>Type</label><select id="type"><option ${existing?.type === 'deposit' ? 'selected' : ''}>deposit</option><option ${existing?.type === 'nodeposit' ? 'selected' : ''}>nodeposit</option><option ${existing?.type === 'contest' ? 'selected' : ''}>contest</option></select></div>
            <div><label>Regulation</label><input id="regulation" value="${escapeHtml(existing?.regulation || 'ASIC, CySEC')}"></div>
            <div><label>Country</label><input id="country" value="${escapeHtml(existing?.country || 'Global')}"></div>
            <div><label>Claim URL *</label><input id="claimUrl" value="${escapeHtml(existing?.claimUrl || '')}" placeholder="https://..."></div>
            <div><label>Requirements</label><textarea id="requirements" rows="2">${escapeHtml(existing?.requirements || 'Min deposit $200. 1 lot per $10 bonus.')}</textarea></div>
            <div class="md:col-span-2"><label>Description</label><textarea id="description" rows="2">${escapeHtml(existing?.description || 'بەم بۆنسە سەرمایەی خۆت دوو هێندە بکە.')}</textarea></div>
            <div><label>How To Claim Steps</label><textarea id="howToClaimSteps" rows="2">${escapeHtml(existing?.howToClaimSteps || '1. Register / 2. Deposit / 3. Claim')}</textarea></div>
            <div><label>Reviews</label><input id="reviews" type="number" value="${existing?.reviews || 0}"></div>
            <div><label>Views</label><input id="views" type="number" value="${existing?.views || 0}"></div>
            <div class="flex gap-4"><label><input type="checkbox" id="isActive" ${existing?.isActive !== false ? 'checked' : ''}> Active</label>
            <label><input type="checkbox" id="isPopular" ${existing?.isPopular ? 'checked' : ''}> Popular</label>
            <label><input type="checkbox" id="isVerified" ${existing?.isVerified ? 'checked' : ''}> Verified</label></div>
          </div>
          <div class="px-6 py-4 border-t border-gray-700 flex justify-end gap-3">
            <button id="cancelModal" class="px-4 py-2 bg-gray-700 rounded-xl">پاشگەزبوونەوە</button>
            <button id="saveBonus" class="px-6 py-2 btn-primary rounded-xl font-semibold">پاشەکەوتکردن</button>
          </div>
        </div>
      `;
      document.body.appendChild(modalDiv);
      const close = () => modalDiv.remove();
      document.getElementById("closeModal").onclick = close;
      document.getElementById("cancelModal").onclick = close;
      document.getElementById("saveBonus").onclick = async () => {
        const payload = {
          brokerName: document.getElementById("brokerName").value,
          title: document.getElementById("title").value,
          amount: document.getElementById("amount").value,
          maxBonus: document.getElementById("maxBonus").value,
          minDeposit: document.getElementById("minDeposit").value,
          rating: parseFloat(document.getElementById("rating").value) || 4.0,
          type: document.getElementById("type").value,
          regulation: document.getElementById("regulation").value,
          country: document.getElementById("country").value,
          claimUrl: document.getElementById("claimUrl").value,
          requirements: document.getElementById("requirements").value,
          description: document.getElementById("description").value,
          howToClaimSteps: document.getElementById("howToClaimSteps").value,
          reviews: parseInt(document.getElementById("reviews").value) || 0,
          views: parseInt(document.getElementById("views").value) || 0,
          isActive: document.getElementById("isActive").checked,
          isPopular: document.getElementById("isPopular").checked,
          isVerified: document.getElementById("isVerified").checked,
          updatedAt: Date.now(),
          brokerId: existing?.brokerId || `broker_${Date.now()}`
        };
        if (!payload.brokerName || !payload.title || !payload.claimUrl) {
          alert("Broker Name, Title and Claim URL پێویستن");
          return;
        }
        if (!isEdit) {
          payload.createdAt = Date.now();
          const newRef = push(ref(db, "bonuses"));
          await set(newRef, payload);
        } else {
          await update(ref(db, `bonuses/${bonusId}`), payload);
        }
        close();
        fetchBonuses();
      };
    }

    // Fetch bonuses from Firebase
    function fetchBonuses() {
      const bonusesRef = ref(db, "bonuses");
      onValue(bonusesRef, (snap) => {
        bonusesData = snap.val() || {};
        render();
      });
    }

    // Helper
