<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel – Broker Bonus Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: #2a2a2a;
    --accent: #f0b429;
    --accent2: #e53e3e;
    --accent3: #38a169;
    --text: #f0f0f0;
    --muted: #888;
    --input-bg: #1e1e1e;
    --radius: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.6);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #1a1400 0%, #0a0a0a 70%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 360px;
    box-shadow: var(--shadow), 0 0 60px rgba(240,180,41,0.07);
    text-align: center;
  }
  .login-box .logo { font-size: 2.4rem; margin-bottom: 8px; }
  .login-box h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .login-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 1rem;
    outline: none;
    margin-bottom: 14px;
    letter-spacing: 3px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-box button:hover { opacity: 0.88; }
  .login-error {
    color: var(--accent2);
    font-size: 0.85rem;
    margin-top: 10px;
    display: none;
  }

  /* ── ADMIN SHELL ── */
  #admin-shell { display: none; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .brand { font-weight: 800; font-size: 1.05rem; color: var(--accent); letter-spacing: 0.5px; }
  header .header-right { display: flex; align-items: center; gap: 14px; }
  header .badge-count {
    background: var(--accent);
    color: #000;
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 8px;
  }
  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

  main { padding: 28px; max-width: 1400px; margin: 0 auto; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .stat-card .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-card .stat-value { font-size: 1.7rem; font-weight: 800; }
  .stat-card.total .stat-value { color: var(--accent); }
  .stat-card.active-s .stat-value { color: var(--accent3); }
  .stat-card.inactive-s .stat-value { color: var(--accent2); }
  .stat-card.ndb .stat-value { color: #63b3ed; }
  .stat-card.deposit .stat-value { color: #d6bcfa; }
  .stat-card.contest .stat-value { color: #fbb6ce; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .toolbar input[type="search"] {
    flex: 1;
    min-width: 220px;
    padding: 9px 14px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .toolbar input[type="search"]:focus { border-color: var(--accent); }
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-tab {
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 20px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-tab:hover, .filter-tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .filter-tab.f-active-only:hover, .filter-tab.f-active-only.active { background: var(--accent3); border-color: var(--accent3); color: #fff; }
  .filter-tab.f-inactive-only:hover, .filter-tab.f-inactive-only.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-add {
    margin-left: auto;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    padding: 9px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-export {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-weight: 600;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-export:hover { background: var(--accent); color: #000; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead tr { border-bottom: 1px solid var(--border); }
  thead th {
    padding: 12px 14px;
    text-align: left;
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--accent); }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody td { padding: 11px 14px; vertical-align: middle; }
  .td-id { color: var(--muted); font-size: 0.78rem; }
  .td-name { font-weight: 600; }
  .td-broker { color: var(--muted); font-size: 0.8rem; }
  .td-amount { color: var(--accent); font-weight: 600; white-space: nowrap; }
  .cat-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cat-no_deposit { background: rgba(99,179,237,0.15); color: #63b3ed; border: 1px solid rgba(99,179,237,0.3); }
  .cat-deposit { background: rgba(214,188,250,0.15); color: #d6bcfa; border: 1px solid rgba(214,188,250,0.3); }
  .cat-contest { background: rgba(251,182,206,0.15); color: #fbb6ce; border: 1px solid rgba(251,182,206,0.3); }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .status-active { background: rgba(56,161,105,0.15); color: var(--accent3); border-color: rgba(56,161,105,0.3); }
  .status-inactive { background: rgba(229,62,62,0.15); color: var(--accent2); border-color: rgba(229,62,62,0.3); }
  .status-badge:hover { opacity: 0.75; }
  .status-badge::before { content: '●'; font-size: 0.6rem; }
  .td-views { color: var(--muted); font-size: 0.82rem; white-space: nowrap; }
  .td-rating { color: var(--accent); font-size: 0.82rem; }
  .actions { display: flex; gap: 7px; }
  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 580px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 22px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 1.3rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 0 24px 24px; }
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    padding: 10px 14px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-row textarea { min-height: 100px; resize: vertical; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row select option { background: var(--card); }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding-top: 8px;
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  .btn-save {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    padding: 10px 22px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* ── CONFIRM DELETE ── */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    box-shadow: var(--shadow);
    animation: slideUp 0.2s ease;
  }
  .confirm-box .icon { font-size: 2rem; margin-bottom: 12px; }
  .confirm-box h3 { font-size: 1.1rem; margin-bottom: 8px; }
  .confirm-box p { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }
  .confirm-actions { display: flex; gap: 10px; justify-content: center; }
  .btn-confirm-del {
    background: var(--accent2);
    color: #fff;
    font-weight: 700;
    padding: 10px 22px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent3);
    color: #fff;
    padding: 12px 22px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 0.9rem;
    box-shadow: var(--shadow);
    z-index: 400;
    display: none;
    animation: fadeInUp 0.3s ease;
  }
  #toast.error { background: var(--accent2); }
  @keyframes fadeInUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  @media (max-width: 640px) {
    main { padding: 16px; }
    .form-grid-2 { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .btn-add, .btn-export { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">🐋</div>
    <h2>Admin Access</h2>
    <p>Broker Bonus Control Panel</p>
    <input type="password" id="pwd-input" placeholder="Enter password" autocomplete="current-password" />
    <button onclick="tryLogin()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<div id="admin-shell">
  <header>
    <div class="brand">⚡ Broker Admin</div>
    <div class="header-right">
      <span class="badge-count" id="total-badge">0 Brokers</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="stats-row" id="stats-row"></div>

    <div class="toolbar">
      <input type="search" id="search-input" placeholder="Search broker name or bonus…" oninput="renderTable()" />
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-tab" data-filter="no_deposit" onclick="setFilter('no_deposit',this)">No Deposit</button>
        <button class="filter-tab" data-filter="deposit" onclick="setFilter('deposit',this)">Deposit Bonus</button>
        <button class="filter-tab" data-filter="contest" onclick="setFilter('contest',this)">Contest</button>
        <button class="filter-tab f-active-only" data-filter="status_active" onclick="setFilter('status_active',this)">Active</button>
        <button class="filter-tab f-inactive-only" data-filter="status_inactive" onclick="setFilter('status_inactive',this)">Inactive</button>
      </div>
      <button class="btn-export" onclick="exportJSON()">⬇ Export JSON</button>
      <button class="btn-add" onclick="openAdd()">+ Add Broker</button>
    </div>

    <div class="table-wrap">
      <table id="broker-table">
        <thead>
          <tr>
            <th onclick="sortBy('id')">#</th>
            <th onclick="sortBy('name')">Broker Name</th>
            <th onclick="sortBy('bonusAmount')">Bonus</th>
            <th onclick="sortBy('category')">Category</th>
            <th onclick="sortBy('status')">Status</th>
            <th onclick="sortBy('viewCount')">Views</th>
            <th onclick="sortBy('ratingAvg')">Rating</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Broker</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id" />
      <div class="form-grid-2">
        <div class="form-row">
          <label>Broker Name *</label>
          <input type="text" id="f-name" placeholder="e.g. XM Broker" />
        </div>
        <div class="form-row">
          <label>Bonus Amount *</label>
          <input type="text" id="f-bonus" placeholder="e.g. $100 or 50%" />
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label>Category *</label>
          <select id="f-category">
            <option value="no_deposit">No Deposit Bonus</option>
            <option value="deposit">Deposit Bonus</option>
            <option value="contest">Contest</option>
          </select>
        </div>
        <div class="form-row">
          <label>Status</label>
          <select id="f-status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Broker Website Link</label>
        <input type="url" id="f-link" placeholder="https://brokersite.com" />
      </div>
      <div class="form-row">
        <label>Bonus Rules / Description *</label>
        <textarea id="f-rules" placeholder="Enter the bonus conditions and rules…"></textarea>
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label>View Count</label>
          <input type="number" id="f-views" placeholder="0" min="0" />
        </div>
        <div class="form-row">
          <label>Rating Avg (0–5)</label>
          <input type="number" id="f-rating" placeholder="0" min="0" max="5" step="0.01" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveBroker()">Save Broker</button>
      </div>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="icon">🗑️</div>
    <h3>Delete Broker?</h3>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

═══════════════════════════════════════════════ */
let brokers = [];
let currentFilter = 'all';
let sortKey = 'viewCount';
let sortDir = -1;
let deletePendingId = null;

/* ═══════════════════════════════════════════════
   INIT (Fetch from Firebase Live)
═══════════════════════════════════════════════ */
async function init() {
  toast('Fetching brokers from Firebase...');
  try {
    const res = await fetch(FIREBASE_URL);
    const data = await res.json();
    
    if (!data) {
      // If Firebase node is empty, populate it with SEED data automatically
      brokers = JSON.parse(JSON.stringify(SEED));
      await save();
    } else if (Array.isArray(data)) {
      brokers = data.filter(x => x !== null);
    } else {
      brokers = Object.values(data);
    }
    
    renderStats();
    renderTable();
    toast('Data synchronized successfully');
  } catch (err) {
    console.error(err);
    toast('Firebase Link Error! Using fallback data.', true);
    brokers = JSON.parse(JSON.stringify(SEED));
    renderStats();
    renderTable();
  }
}

/* ═══════════════════════════════════════════════
   SAVE (PUT directly to Firebase Node)
═══════════════════════════════════════════════ */
async function save() {
  try {
    const res = await fetch(FIREBASE_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(brokers)
    });
    if (!res.ok) throw new Error("Sync failure");
  } catch (err) {
    console.error(err);
    toast('Failed to sync changes with Firebase!', true);
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

function tryLogin() {
  const val = document.getElementById('pwd-input').value.trim();
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-shell').style.display = 'block';
    init();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('pwd-input').value = '';
    setTimeout(() => { err.style.display = 'none'; }, 3000);
  }
}

function logout() {
  document.getElementById('admin-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  brokers = [];
}

function renderStats() {
  const total = brokers.length;
  const active = brokers.filter(b => b.status === 'active').length;
  const inactive = brokers.filter(b => b.status === 'inactive').length;
  const ndb = brokers.filter(b => b.category === 'no_deposit').length;
  const dep = brokers.filter(b => b.category === 'deposit').length;
  const con = brokers.filter(b => b.category === 'contest').length;

  document.getElementById('total-badge').textContent = total + ' Brokers';
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card total"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat-card active-s"><div class="stat-label">Active</div><div class="stat-value">${active}</div></div>
    <div class="stat-card inactive-s"><div class="stat-label">Inactive</div><div class="stat-value">${inactive}</div></div>
    <div class="stat-card ndb"><div class="stat-label">No Deposit</div><div class="stat-value">${ndb}</div></div>
    <div class="stat-card deposit"><div class="stat-label">Deposit Bonus</div><div class="stat-value">${dep}</div></div>
    <div class="stat-card contest"><div class="stat-label">Contest</div><div class="stat-value">${con}</div></div>
  `;
}

/* ═══════════════════════════════════════════════
   TABLE
═══════════════════════════════════════════════ */
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  renderTable();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  return brokers
    .filter(b => {
      if (currentFilter === 'no_deposit') return b.category === 'no_deposit';
      if (currentFilter === 'deposit') return b.category === 'deposit';
      if (currentFilter === 'contest') return b.category === 'contest';
      if (currentFilter === 'status_active') return b.status === 'active';
      if (currentFilter === 'status_inactive') return b.status === 'inactive';
      return true;
    })
    .filter(b => !q || b.name.toLowerCase().includes(q) || (b.bonusAmount||'').toLowerCase().includes(q))
    .sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
}

const CAT_LABEL = { no_deposit: 'No Deposit', deposit: 'Deposit', contest: 'Contest' };

function renderTable() {
  const rows = getFiltered();
  const tbody = document.getElementById('table-body');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div><div>No brokers found</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(b => `
    <tr>
      <td class="td-id">${b.id}</td>
      <td><div class="td-name">${esc(b.name)}</div>${b.link ? `<div class="td-broker"><a href="${esc(b.link)}" target="_blank" rel="noopener" style="color:var(--muted);font-size:0.75rem;">${esc(b.link.replace(/https?:\/\//,''))}</a></div>` : ''}</td>
      <td class="td-amount">${esc(b.bonusAmount||'')}</td>
      <td><span class="cat-badge cat-${b.category}">${CAT_LABEL[b.category]||b.category}</span></td>
      <td><span class="status-badge status-${b.status}" onclick="toggleStatus(${b.id})" title="Click to toggle">${b.status==='active'?'Active':'Inactive'}</span></td>
      <td class="td-views">👁 ${(b.viewCount||0).toLocaleString()}</td>
      <td class="td-rating">${b.ratingAvg>0?'★ '+b.ratingAvg.toFixed(2):'—'}</td>
      <td>
        <div class="actions">
          <button class="btn-icon edit" onclick="openEdit(${b.id})">✎ Edit</button>
          <button class="btn-icon del" onclick="askDelete(${b.id})">✕ Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════
   TOGGLE STATUS
═══════════════════════════════════════════════ */
async function toggleStatus(id) {
  const b = brokers.find(x => x.id === id);
  if (!b) return;
  b.status = b.status === 'active' ? 'inactive' : 'active';
  renderStats();
  renderTable();
  toast(`${b.name} marked as ${b.status}`);
  await save();
}

async function saveBroker() {
  const name = document.getElementById('f-name').value.trim();
  const bonus = document.getElementById('f-bonus').value.trim();
  const rules = document.getElementById('f-rules').value.trim();
  if (!name) { toast('Broker name is required', true); return; }
  if (!bonus) { toast('Bonus amount is required', true); return; }
  if (!rules) { toast('Rules/description is required', true); return; }

  const idRaw = document.getElementById('f-id').value;
  const isEdit = !!idRaw;
  const views = parseInt(document.getElementById('f-views').value)||0;
  const rating = parseFloat(document.getElementById('f-rating').value)||0;
  const category = document.getElementById('f-category').value;
  const status = document.getElementById('f-status').value;
  const link = document.getElementById('f-link').value.trim();

  if (isEdit) {
    const id = parseInt(idRaw);
    const b = brokers.find(x => x.id === id);
    if (b) {
      b.name = name; b.bonusAmount = bonus; b.category = category;
      b.status = status; b.link = link; b.rules = rules;
      b.viewCount = views; b.ratingAvg = rating;
    }
    toast('Broker updated successfully');
  } else {
    const maxId = brokers.reduce((m, b) => Math.max(m, b.id), 0);
    brokers.push({
      id: maxId + 1, name, bonusAmount: bonus, category, status,
      link, rules, viewCount: views, ratingAvg: rating,
      ratingCount: 0, createdAt: new Date().toISOString()
    });
    toast('Broker added successfully');
  }

  closeModal();
  renderStats();
  renderTable();
  await save();
}

/* ═══════════════════════════════════════════════
   DELETE
═══════════════════════════════════════════════ */
function askDelete(id) {
  const b = brokers.find(x => x.id === id);
  if (!b) return;
  deletePendingId = id;
  document.getElementById('confirm-msg').textContent = `Delete "${b.name}" (${b.bonusAmount})? This cannot be undone.`;
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm() {
  deletePendingId = null;
  document.getElementById('confirm-overlay').classList.remove('open');
}

async function confirmDelete() {
  if (deletePendingId === null) return;
  const idx = brokers.findIndex(x => x.id === deletePendingId);
  const name = brokers[idx]?.name || 'Broker';
  if (idx !== -1) brokers.splice(idx, 1);
  closeConfirm();
  renderStats();
  renderTable();
  toast(`${name} deleted`);
  await save();
}

/* ═══════════════════════════════════════════════
   EXPORT JSON
═══════════════════════════════════════════════ */
function exportJSON() {
  const data = JSON.stringify(brokers, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'brokers.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('brokers.json downloaded');
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
let toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

/* ═══════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeConfirm(); }
});

/* Close modal on overlay click */
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('confirm-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('confirm-overlay')) closeConfirm();
});
</script>
</body>
</html>
