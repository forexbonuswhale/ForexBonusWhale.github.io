<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <script>
      // هاوئاهەنگکردنی تێم لەگەڵ سایتی سەرەکی
      (function(){var s=localStorage.getItem("fbw_theme");var t=(s==="light"||s==="dark")?s:"dark";document.documentElement.classList.add(t==="dark"?"dark":"light");})();
      document.addEventListener('wheel',function(e){if(e.ctrlKey)e.preventDefault();},{passive:false});
      document.addEventListener('keydown',function(e){if(e.ctrlKey&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault();},{passive:false});
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>FBW - Admin Panel</title>
    
    <!-- بەکارهێنانی Tailwind CSS CDN بۆ ئاسانکاری کارکردن لەسەر مۆبایل -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              darkBg: '#0f172a',
              darkCard: '#1e293b'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased">

    <!-- ١. بەشی چوونەژوورەوە (Login Screen) -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
      <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
          <!-- نیشانەی شین بەپێی ویستی خۆت -->
          <div class="w-16 h-16 bg-blue-600/10 text-blue-500 rounded-full flex items-center justify-center mb-3">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <h2 class="text-xl font-bold tracking-tight text-white">ForexBonusWhale Admin</h2>
          <p class="text-sm text-slate-400 mt-1">Please enter your password to continue</p>
        </div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="mb-4">
            <input type="password" id="admin-password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-center tracking-widest">
            <p id="login-error" class="text-red-500 text-xs mt-2 hidden text-center">پاسۆردەکە هەڵەیە، دووبارە تاقی بکەرەوە</p>
          </div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-blue-600/20">چوونەژوورەوە</button>
        </form>
      </div>
    </div>

    <!-- ٢. بەشی کۆنترۆڵ (Main Dashboard Panel) -->
    <div id="admin-panel" class="hidden container mx-auto px-4 py-6 max-w-4xl">
      <!-- هێدەر -->
      <header class="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></div>
          <h1 class="text-lg font-bold text-white tracking-wide">FBW Panel</h1>
        </div>
        <button onclick="handleLogout()" class="text-xs bg-slate-750 hover:bg-red-900/40 text-slate-300 hover:text-red-400 px-3 py-1.5 rounded-lg border border-slate-700 transition-all">Sign Out</button>
      </header>

      <!-- فۆرمی زیادکردن و دەستکاری برۆکەر -->
      <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg mb-8">
        <h3 id="form-title" class="text-md font-semibold text-white mb-4 flex items-center gap-2">
          <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> زیادکردنی برۆکەری نوێ
        </h3>
        
        <form id="broker-form" class="space-y-4">
          <input type="hidden" id="broker-id">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">ناوی برۆکەر (Broker Name)</label>
              <input type="text" id="b-name" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">جۆری پاداشت (Bonus Type)</label>
              <select id="b-type" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
                <option value="No-Deposit Bonus">No-Deposit Bonus</option>
                <option value="Funded Challenge">Funded Challenge</option>
                <option value="Deposit Bonus">Deposit Bonus</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">بڕی بۆنوس / ئەکاونت (Amount e.g. $100)</label>
              <input type="text" id="b-amount" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">بەستەری لۆگۆ (Logo URL)</label>
              <input type="url" id="b-logo" placeholder="https://..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">یاسا فەرمییەکان یان بەستەری ناونوسین (Broker Link / Rules)</label>
            <input type="url" id="b-link" required placeholder="https://..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
          </div>

          <div class="flex items-center gap-2 pt-2">
            <input type="checkbox" id="b-active" checked class="w-4 h-4 rounded text-blue-600 bg-slate-900 border-slate-700 focus:ring-blue-500">
            <label for="b-active" class="text-xs font-medium text-slate-300">ئەم برۆکەرە چالاک بێت و پیشان بدرێت (Active)</label>
          </div>

          <div class="flex gap-2 pt-2">
            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-xl transition-all">پاشکەوتکردن</button>
            <button type="button" id="cancel-edit" onclick="resetBrokerForm()" class="hidden bg-slate-700 hover:bg-slate-600 text-white font-medium py-2 px-4 rounded-xl transition-all">پاشگەزبوونەوە</button>
          </div>
        </form>
      </section>

      <!-- لیستی برۆکەرەکان -->
      <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
        <h3 class="text-md font-semibold text-white mb-4 flex items-center gap-2">
          <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> لیستی برۆکەرە تۆمارکراوەکان (<span id="broker-count">0</span>)
        </h3>
        <div id="brokers-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
          <!-- لێرەدا بە جەی ئێس برۆکەرەکان ڕێبکەون -->
          <p class="text-sm text-slate-500 text-center py-4">لە حاڵەتی بارکردنی داتاکان لە Firebase...</p>
        </div>
      </section>
    </div>

    <!-- مۆدیولەکانی فەرمی Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // کۆنفیگی فەرمی فایەربەیسەکەت بەبێ پێویستی کلیل بۆ ئاسانکاری
      const firebaseConfig = {
        databaseURL: "https://froexbonuswhale-default-rtdb.firebaseio.com"
      };

      // ئەکتیڤکردنی فایەربەیس
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const brokersRef = ref(db, "brokers");

      // سیستەمی لۆگین
      window.handleLogin = function(e) {
        e.preventDefault();
        const passInput = document.getElementById("admin-password").value;
        
        // مەرجی ووشەی نهێنی بە پیتی بچووک لێرە جێگیرکراوە
        if (passInput === "gg898989") {
          sessionStorage.setItem("fbw_authenticated", "true");
          checkAuth();
        } else {
          const err = document.getElementById("login-error");
          err.classList.remove("hidden");
        }
      }

      window.handleLogout = function() {
        sessionStorage.removeItem("fbw_authenticated");
        checkAuth();
      }

      function checkAuth() {
        const auth = sessionStorage.getItem("fbw_authenticated");
        if (auth === "true") {
          document.getElementById("login-screen").classList.add("hidden");
          document.getElementById("admin-panel").classList.remove("hidden");
          loadBrokers();
        } else {
          document.getElementById("login-screen").classList.remove("hidden");
          document.getElementById("admin-panel").classList.add("hidden");
        }
      }

      // لۆدکردنی ئۆتۆماتیکی داتاکان لە فایەربەیسەوە
      function loadBrokers() {
        onValue(brokersRef, (snapshot) => {
          const data = snapshot.val();
          const listContainer = document.getElementById("brokers-list");
          listContainer.innerHTML = "";
          
          if (!data) {
            listContainer.innerHTML = `<p class="text-sm text-slate-500 text-center py-6">هیچ برۆکەرێک نییە، یەکەم برۆکەر زیاد بکە!</p>`;
            document.getElementById("broker-count").innerText = "0";
            return;
          }

          const keys = Object.keys(data);
          document.getElementById("broker-count").innerText = keys.length;

          keys.forEach((key) => {
            const b = data[key];
            const item = document.createElement("div");
            item.className = "flex items-center justify-between p-3 bg-slate-900 border border-slate-700/60 rounded-xl hover:border-blue-500/40 transition-all";
            item.innerHTML = `
              <div class="flex items-center gap-3">
                <img src="${b.logo || 'https://via.placeholder.com/40/1e293b/ffffff?text=FBW'}" class="w-10 h-10 rounded-lg object-contain bg-slate-800 p-1 error-img" onerror="this.src='https://via.placeholder.com/40/1e293b/ffffff?text=FBW'">
                <div>
                  <h4 class="font-semibold text-sm text-white">${b.name} <span class="text-xs font-normal text-slate-400">(${b.amount})</span></h4>
                  <p class="text-xs text-blue-400 mt-0.5">${b.type} • ${b.active ? '<span class="text-green-400">چالاک</span>' : '<span class="text-amber-500">ناچالاک</span>'}</p>
                </div>
              </div>
              <div class="flex items-center gap-1">
                <button onclick="editBroker('${key}', '${b.name}', '${b.type}', '${b.amount}', '${b.logo || ''}', '${b.link}', ${b.active})" class="p-2 text-slate-400 hover:text-blue-400 transition-all">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </button>
                <button onclick="deleteBroker('${key}')" class="p-2 text-slate-400 hover:text-red-400 transition-all">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
              </div>
            `;
            listContainer.appendChild(item);
          });
        });
      }

      // ناردنی فۆرم بۆ فایەربەیس (زیادکردن یان گۆڕین)
      document.getElementById("broker-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const id = document.getElementById("broker-id").value;
        const brokerData = {
          name: document.getElementById("b-name").value,
          type: document.getElementById("b-type").value,
          amount: document.getElementById("b-amount").value,
          logo: document.getElementById("b-logo").value,
          link: document.getElementById("b-link").value,
          active: document.getElementById("b-active").checked
        };

        if (id) {
          // ئەپدەیتکردنی یەکێکی کۆن
          update(ref(db, `brokers/${id}`), brokerData)
            .then(() => resetBrokerForm());
        } else {
          // دروستکردنی دانەیەکی نوێ
          push(brokersRef, brokerData)
            .then(() => resetBrokerForm());
        }
      });

      // ئامادەکاری بۆ مۆدی دەستکاری (Edit)
      window.editBroker = function(id, name, type, amount, logo, link, active) {
        document.getElementById("broker-id").value = id;
        document.getElementById("b-name").value = name;
        document.getElementById("b-type").value = type;
        document.getElementById("b-amount").value = amount;
        document.getElementById("b-logo").value = logo === 'undefined' ? '' : logo;
        document.getElementById("b-link").value = link;
        document.getElementById("b-active").checked = active;
        
        document.getElementById("form-title").innerHTML = `<span class="w-1.5 h-4 bg-amber-500 rounded-full"></span> دەستکاریکردنی برۆکەر`;
        document.getElementById("cancel-edit").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // سڕینەوە لە بنکەی دراوە
      window.deleteBroker = function(id) {
        if (confirm("ئایا دڵنیای لە سڕینەوەی ئەم برۆکەرە؟")) {
          remove(ref(db, `brokers/${id}`));
        }
      }

      window.resetBrokerForm = function() {
        document.getElementById("broker-form").reset();
        document.getElementById("broker-id").value = "";
        document.getElementById("form-title").innerHTML = `<span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> زیادکردنی برۆکەری نوێ`;
        document.getElementById("cancel-edit").classList.add("hidden");
      }

      // پشکنینی سەرەتایی لە کاتی لۆدبوونی لاپەڕەکە
      checkAuth();
    </script>
  </body>
  </html>
