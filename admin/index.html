<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Whale Admin Panel</title>
    <style>
        body { background: #0b111e; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #131c2e; padding: 20px; border-radius: 10px; }
        #adminPanel { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: left; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginBox" class="container">
    <h2>Login</h2>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Enter</button>
</div>

<div id="adminPanel" class="container">
    <h2>Manage All Brokers</h2>
    <button onclick="download()">📥 Download Updated brokers.json</button>
    <div id="tableContainer"></div>
</div>

<script>
    // لێرەدا هەموو برۆکەرەکانت دابنێ (کە پێشتر هەتبوو)
    let brokers = [ /* لێرە برۆکەرەکانت دابنێ */ ];

    function login() {
        if(document.getElementById('pass').value === "Whale2026") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderTable();
        } else { alert("Wrong Password"); }
    }

    function renderTable() {
        let html = "<table>";
        brokers.forEach(b => {
            html += `<tr><td>${b.name}</td><td><button>Edit</button><button>Delete</button></td></tr>`;
        });
        html += "</table>";
        document.getElementById('tableContainer').innerHTML = html;
    }

    function download() {
        alert("فایلەکەت ئامادەیە!");
    }
</script>
</body>
</html>
