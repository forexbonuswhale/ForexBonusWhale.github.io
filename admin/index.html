<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <script>
      // Theme sync matching index.html
      (function(){var s=localStorage.getItem("fbw_theme");var t=(s==="light"||s==="dark")?s:"dark";document.documentElement.classList.add(t==="dark"?"dark":"light");})();
      document.addEventListener('wheel',function(e){if(e.ctrlKey)e.preventDefault();},{passive:false});
      document.addEventListener('keydown',function(e){if(e.ctrlKey&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault();},{passive:false});
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>FBW - Admin Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              darkBg: '#0f172a',
              darkCard: '#1e293b'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased">

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
      <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
          <div class="w-16 h-16 bg-blue-600/10 text-blue-500 rounded-full flex items-center justify-center mb-3">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <h2 class="text-xl font-bold tracking-tight text-white">ForexBonusWhale Admin</h2>
          <p class="text-sm text-slate-400 mt-1">Access dashboard management</p>
        </div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="mb-4">
            <input type="password" id="admin-password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-center tracking-widest">
            <p id="login-error" class="text-red-500 text-xs mt-2 hidden text-center">Invalid password. Please try again.</p>
          </div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-blue-600/20">Sign In</button>
        </form>
      </div>
    </div>

    <div id="admin-panel" class="hidden container mx-auto px-4 py-6 max-w-4xl">
      
      <header class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></div>
          <h1 class="text-md font-bold text-white tracking-wide">FBW Admin Engine</h1>
        </div>
        <button onclick="handleLogout()" class="text-xs bg-slate-700 hover:bg-red-900/40 text-slate-300 hover:text-red-400 px-3 py-1.5 rounded-lg border border-slate-600 transition-all">Sign Out</button>
      </header>

      <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-lg mb-6">
        <h3 id="form-title" class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
          <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> Add New Broker listing
        </h3>
        
        <form id="broker-form" class="space-y-4">
          <input type="hidden" id="broker-id">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Broker Name</label>
              <input type="text" id="b-name" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Bonus Category</label>
              <select id="b-type" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
                <option value="No-Deposit Bonus">No-Deposit Bonus</option>
                <option value="Funded Challenge">Funded Challenge</option>
                <option value="Deposit Bonus">Deposit Bonus</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Account Value / Amount (e.g. $100)</label>
              <input type="text" id="b-amount" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Logo URL Image</label>
              <input type="url" id="b-logo" placeholder="https://..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Rating Counter (1.0 - 5.0)</label>
              <input type="number" step="0.1" min="1" max="5" id="b-rating" value="5.0" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Initial View Count</label>
              <input type="number" id="b-views" value="0" min="0" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Broker Landing Page/Registration Link</label>
            <input type="url" id="b-link" required placeholder="https://..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Rules & Execution Guidelines (Detailed terms)</label>
            <textarea id="b-rules" rows="3" placeholder="Enter key conditions or required trading lot steps here..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm"></textarea>
          </div>

          <div class="flex flex-wrap gap-6 pt-2">
            <div class="flex items-center gap-2">
              <input type="checkbox" id="b-active" checked class="w-4 h-4 rounded text-blue-600 bg-slate-900 border-slate-700 focus:ring-blue-500">
              <label for="b-active" class="text-xs font-medium text-slate-300">Active Status (Visible to users)</label>
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" id="b-verified" checked class="w-4 h-4 rounded text-blue-600 bg-slate-900 border-slate-700 focus:ring-blue-500">
              <label for="b-verified" class="text-xs font-medium text-slate-300">Verified Badge Status</label>
            </div>
          </div>

          <div class="flex gap-2 pt-2">
            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-xl transition-all">Save Changes</button>
            <button type="button" id="cancel-edit" onclick="resetBrokerForm()" class="hidden bg-slate-700 hover:bg-slate-600 text-white font-medium py-2 px-4 rounded-xl transition-all">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-lg">
        <h3 class="text-sm font-semibold text-white mb-4 flex items-center justify-between">
          <span class="flex items-center gap-2">
            <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> Live Dashboard Indexes
          </span>
          <span class="bg-slate-900 border border-slate-700 text-xs text-blue-400 font-bold px-2.5 py-1 rounded-full"><span id="broker-count">0</span> Listed</span>
        </h3>
        
        <div id="brokers-list" class="space-y-3 max-h-[550px] overflow-y-auto pr-1">
          <p class="text-sm text-slate-500 text-center py-4">Connecting to core index records...</p>
        </div>
      </section>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        databaseURL: "https://froexbonuswhale-default-rtdb.firebaseio.com"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const brokersRef = ref(db, "brokers");

      // Lowercase security handshake check module
      window.handleLogin = function(e) {
        e.preventDefault();
        const passInput = document.getElementById("admin-password").value;
        
        if (passInput === "gg898989") {
          sessionStorage.setItem("fbw_authenticated", "true");
          checkAuth();
        } else {
          const err = document.getElementById("login-error");
          err.classList.remove("hidden");
        }
      }

      window.handleLogout = function() {
        sessionStorage.removeItem("fbw_authenticated");
        checkAuth();
      }

      function checkAuth() {
        const auth = sessionStorage.getItem("fbw_authenticated");
        if (auth === "true") {
          document.getElementById("login-screen").classList.add("hidden");
          document.getElementById("admin-panel").classList.remove("hidden");
          loadBrokers();
        } else {
          document.getElementById("login-screen").classList.remove("hidden");
          document.getElementById("admin-panel").classList.add("hidden");
        }
      }

      // Realtime fetch and modular element render mapping
      function loadBrokers() {
        onValue(brokersRef, (snapshot) => {
          const data = snapshot.val();
          const listContainer = document.getElementById("brokers-list");
          listContainer.innerHTML = "";
          
          if (!data) {
            listContainer.innerHTML = `<p class="text-sm text-slate-500 text-center py-6">No brokers found in database. Create your first listing above.</p>`;
            document.getElementById("broker-count").innerText = "0";
            return;
          }

          const keys = Object.keys(data);
          document.getElementById("broker-count").innerText = keys.length;

          keys.forEach((key) => {
            const b = data[key];
            
            // Set safe default fallbacks if missing from older item nodes
            const rating = b.rating !== undefined ? b.rating : "5.0";
            const views = b.views !== undefined ? b.views : "0";
            const rulesText = b.rules ? b.rules.replace(/'/g, "\\'").replace(/"/g, '\\"') : "";
            const isVerified = b.verified !== undefined ? b.verified : true;

            const item = document.createElement("div");
            item.className = "p-4 bg-slate-900 border border-slate-700/60 rounded-xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all hover:border-blue-500/30";
            
            item.innerHTML = `
              <div class="flex items-start gap-3 min-w-0 flex-1">
                <img src="${b.logo || 'https://via.placeholder.com/40/1e293b/ffffff?text=FBW'}" class="w-10 h-10 rounded-lg object-contain bg-slate-800 p-1 flex-shrink-0" onerror="this.src='https://via.placeholder.com/40/1e293b/ffffff?text=FBW'">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center flex-wrap gap-1.5">
                    <h4 class="font-bold text-sm text-white truncate">${b.name}</h4>
                    <span class="text-xs bg-slate-800 text-slate-300 border border-slate-700 px-1.5 py-0.5 rounded">${b.amount}</span>
                    ${isVerified ? '<span class="text-[10px] bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded-full border border-blue-500/20 font-semibold tracking-wide">Verified</span>' : '<span class="text-[10px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded-full border border-slate-700">Unverified</span>'}
                  </div>
                  <div class="text-xs text-slate-400 mt-1 space-y-0.5">
                    <p><span class="text-blue-400 font-medium">${b.type}</span> • Status: ${b.active ? '<span class="text-green-400 font-medium">Active</span>' : '<span class="text-amber-500 font-medium">Inactive</span>'}</p>
                    <p class="text-[11px]">Rating: ⭐ ${rating} | Views: 👁️ ${views}</p>
                    ${b.rules ? `<p class="text-[11px] text-slate-500 line-clamp-1 italic mt-1">Rules: "${b.rules}"</p>` : ''}
                  </div>
                </div>
              </div>
              
              <div class="flex items-center gap-2 border-t border-slate-800 sm:border-0 pt-3 sm:pt-0 justify-end">
                <button type="button" id="btn-edit-${key}" class="flex items-center gap-1.5 text-xs bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 px-3 py-2 rounded-lg border border-blue-500/20 transition-all font-medium">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                  Edit
                </button>
                <button type="button" id="btn-del-${key}" class="flex items-center gap-1.5 text-xs bg-red-600/10 hover:bg-red-600/20 text-red-400 px-3 py-2 rounded-lg border border-red-500/20 transition-all font-medium">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  Delete
                </button>
              </div>
            `;
            listContainer.appendChild(item);

            // Safer dynamic event listener mapping to prevent inline quote truncation bugs
            document.getElementById(`btn-edit-${key}`).addEventListener('click', () => {
              window.editBroker(key, b.name, b.type, b.amount, b.logo || '', b.link, b.active, rating, views, rulesText, isVerified);
            });
            document.getElementById(`btn-del-${key}`).addEventListener('click', () => {
              window.deleteBroker(key);
            });
          });
        });
      }

      // Sync submission update pipeline
      document.getElementById("broker-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const id = document.getElementById("broker-id").value;
        const brokerData = {
          name: document.getElementById("b-name").value,
          type: document.getElementById("b-type").value,
          amount: document.getElementById("b-amount").value,
          logo: document.getElementById("b-logo").value,
          link: document.getElementById("b-link").value,
          rules: document.getElementById("b-rules").value,
          rating: parseFloat(document.getElementById("b-rating").value) || 5.0,
          views: parseInt(document.getElementById("b-views").value) || 0,
          active: document.getElementById("b-active").checked,
          verified: document.getElementById("b-verified").checked
        };

        if (id) {
          update(ref(db, `brokers/${id}`), brokerData).then(() => resetBrokerForm());
        } else {
          push(brokersRef, brokerData).then(() => resetBrokerForm());
        }
      });

      // Modular routing into editing engine status context
      window.editBroker = function(id, name, type, amount, logo, link, active, rating, views, rules, verified) {
        document.getElementById("broker-id").value = id;
        document.getElementById("b-name").value = name;
        document.getElementById("b-type").value = type;
        document.getElementById("b-amount").value = amount;
        document.getElementById("b-logo").value = logo;
        document.getElementById("b-link").value = link;
        document.getElementById("b-rules").value = rules;
        document.getElementById("b-rating").value = rating;
        document.getElementById("b-views").value = views;
        document.getElementById("b-active").checked = active;
        document.getElementById("b-verified").checked = verified;
        
        document.getElementById("form-title").innerHTML = `<span class="w-1.5 h-4 bg-amber-500 rounded-full"></span> Edit Broker Listing Context`;
        document.getElementById("cancel-edit").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      window.deleteBroker = function(id) {
        if (confirm("Are you certain you want to remove this broker listing?")) {
          remove(ref(db, `brokers/${id}`));
        }
      }

      window.resetBrokerForm = function() {
        document.getElementById("broker-form").reset();
        document.getElementById("broker-id").value = "";
        document.getElementById("form-title").innerHTML = `<span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> Add New Broker listing`;
        document.getElementById("cancel-edit").classList.add("hidden");
        document.getElementById("b-rating").value = "5.0";
        document.getElementById("b-views").value = "0";
      }

      checkAuth();
    </script>
  </body>
</html>
