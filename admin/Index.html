<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <script>
      (function(){var s=localStorage.getItem("fbw_theme");var t=(s==="light"||s==="dark")?s:"dark";document.documentElement.classList.add(t==="dark"?"dark":"light");})();
      document.addEventListener('wheel',function(e){if(e.ctrlKey)e.preventDefault();},{passive:false});
      document.addEventListener('keydown',function(e){if(e.ctrlKey&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault();},{passive:false});
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>FBW - Admin Panel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              darkBg: '#0f172a',
              darkCard: '#1e293b'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased">

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
      <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
          <div class="w-16 h-16 bg-blue-600/10 text-blue-500 rounded-full flex items-center justify-center mb-3">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <h2 class="text-xl font-bold tracking-tight text-white">ForexBonusWhale Admin</h2>
          <p class="text-sm text-slate-400 mt-1">تکایە وشەی تێپەڕ بنووسە</p>
        </div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="mb-4">
            <input type="password" id="admin-password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-center tracking-widest">
            <p id="login-error" class="text-red-500 text-xs mt-2 hidden text-center">وشەی تێپەڕ هەڵەیە! دووبارە تاقیکەرەوە.</p>
          </div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-blue-600/20">چوونەژوورەوە</button>
        </form>
      </div>
    </div>

    <div id="admin-panel" class="hidden container mx-auto px-4 py-6 max-w-4xl">
      
      <header class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></div>
          <h1 class="text-md font-bold text-white tracking-wide">FBW Admin Engine</h1>
        </div>
        <button onclick="handleLogout()" class="text-xs bg-slate-700 hover:bg-red-900/40 text-slate-300 hover:text-red-400 px-3 py-1.5 rounded-lg border border-slate-600 transition-all">چوونەدەرەوە</button>
      </header>

      <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-lg mb-6">
        <h3 id="form-title" class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
          <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> زیادکردنی برۆکەری نوێ
        </h3>
        
        <form id="broker-form" class="space-y-4">
          <input type="hidden" id="broker-id">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">ناوی برۆکەر (Broker Name)</label>
              <input type="text" id="b-name" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">کاتیگۆری بۆنوس (Category)</label>
              <select id="b-category" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
                <option value="no_deposit">No Deposit Bonus</option>
                <option value="deposit">Deposit Bonus</option>
                <option value="contest">Contest</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">بڕی بۆنوس (Bonus Amount وەک $100)</label>
              <input type="text" id="b-bonusAmount" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">لینک یا ناونیشانی لۆگۆ (Logo URL)</label>
              <input type="url" id="b-logo" placeholder="https://..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">نمرە یا ڕەیتینگ (Rating Avg 0-5)</label>
              <input type="number" step="0.01" min="0" max="5" id="b-ratingAvg" value="5.0" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">ژمارەی بینین (View Count)</label>
              <input type="number" id="b-viewCount" value="0" min="0" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">لینکی ناونووسین لە برۆکەر (Website Link)</label>
            <input type="url" id="b-link" required placeholder="https://..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500">
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">یاساکان و ڕوونکردنەوەی بۆنوس (Rules)</label>
            <textarea id="b-rules" rows="3" required placeholder="یاساکانی وەک لۆت و مەرجەکانی ڕاکێشان لێرە بنووسە..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm"></textarea>
          </div>

          <div class="flex flex-wrap gap-6 pt-2">
            <div class="flex items-center gap-2">
              <select id="b-status" class="px-3 py-1.5 bg-slate-900 border border-slate-700 rounded-lg text-white text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                <option value="active">Active (سایت نیشانی دەدات)</option>
                <option value="inactive">Inactive (ناچالاک لە سایت)</option>
              </select>
              <label class="text-xs font-medium text-slate-300">دۆخی پیشاندان لە سایت</label>
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" id="b-verified" checked class="w-4 h-4 rounded text-blue-600 bg-slate-900 border-slate-700 focus:ring-blue-500">
              <label for="b-verified" class="text-xs font-medium text-slate-300">نیشانەی وەرگرتن (Verified Badge)</label>
            </div>
          </div>

          <div class="flex gap-2 pt-2">
            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-xl transition-all">پاشەکەوتکردن</button>
            <button type="button" id="cancel-edit" onclick="resetBrokerForm()" class="hidden bg-slate-700 hover:bg-slate-600 text-white font-medium py-2 px-4 rounded-xl transition-all">پاشگەزبوونەوە</button>
          </div>
        </form>
      </section>

      <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-lg">
        <h3 class="text-sm font-semibold text-white mb-4 flex items-center justify-between">
          <span class="flex items-center gap-2">
            <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> لیستی گشتی برۆکەرەکان
          </span>
          <span class="bg-slate-900 border border-slate-700 text-xs text-blue-400 font-bold px-2.5 py-1 rounded-full"><span id="broker-count">0</span> برۆکەر</span>
        </h3>
        
        <div id="brokers-list" class="space-y-3 max-h-[550px] overflow-y-auto pr-1">
          <p class="text-sm text-slate-500 text-center py-4">چاوەڕوانبە بۆ بەستنەوە بە داتابەیس...</p>
        </div>
      </section>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        databaseURL: "https://froexbonuswhale-default-rtdb.firebaseio.com"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const brokersRef = ref(db, "brokers");

      // پۆلی پشکنینی وشەی تێپەڕ بەپیی داواکاری خۆت (gg898989)
      window.handleLogin = function(e) {
        e.preventDefault();
        const passInput = document.getElementById("admin-password").value;
        
        if (passInput === "gg898989") {
          sessionStorage.setItem("fbw_authenticated", "true");
          checkAuth();
        } else {
          const err = document.getElementById("login-error");
          err.classList.remove("hidden");
        }
      }

      window.handleLogout = function() {
        sessionStorage.removeItem("fbw_authenticated");
        checkAuth();
      }

      function checkAuth() {
        const auth = sessionStorage.getItem("fbw_authenticated");
        if (auth === "true") {
          document.getElementById("login-screen").classList.add("hidden");
          document.getElementById("admin-panel").classList.remove("hidden");
          loadBrokers();
        } else {
          document.getElementById("login-screen").classList.remove("hidden");
          document.getElementById("admin-panel").classList.add("hidden");
        }
      }

      // خوێندنەوەی داتا بە شێوازی Realtime لە Firebase
      function loadBrokers() {
        onValue(brokersRef, (snapshot) => {
          const data = snapshot.val();
          const listContainer = document.getElementById("brokers-list");
          listContainer.innerHTML = "";
          
          if (!data) {
            listContainer.innerHTML = `<p class="text-sm text-slate-500 text-center py-6">هیچ برۆکەرێک لە داتابەیسدا نییە.</p>`;
            document.getElementById("broker-count").innerText = "0";
            return;
          }

          const keys = Object.keys(data);
          document.getElementById("broker-count").innerText = keys.length;

          keys.forEach((key) => {
            const b = data[key];
            
            // دڵنیابوونەوە لە ناوە هاوشێوەکانی سایتی فەرمی
            const ratingAvg = b.ratingAvg !== undefined ? b.ratingAvg : 0;
            const viewCount = b.viewCount !== undefined ? b.viewCount : 0;
            const statusStr = b.status || "active"; 
            const rulesText = b.rules ? b.rules.replace(/'/g, "\\'").replace(/"/g, '\\"') : "";
            const isVerified = b.verified !== undefined ? b.verified : true;

            const item = document.createElement("div");
            item.className = "p-4 bg-slate-900 border border-slate-700/60 rounded-xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all hover:border-blue-500/30";
            
            item.innerHTML = `
              <div class="flex items-start gap-3 min-w-0 flex-1 text-left">
                <img src="${b.logo || 'https://via.placeholder.com/40/1e293b/ffffff?text=FBW'}" class="w-10 h-10 rounded-lg object-contain bg-slate-800 p-1 flex-shrink-0" onerror="this.src='https://via.placeholder.com/40/1e293b/ffffff?text=FBW'">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center flex-wrap gap-1.5">
                    <h4 class="font-bold text-sm text-white truncate">${b.name}</h4>
                    <span class="text-xs bg-slate-800 text-slate-300 border border-slate-700 px-1.5 py-0.5 rounded">${b.bonusAmount || ''}</span>
                    ${isVerified ? '<span class="text-[10px] bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded-full border border-blue-500/20 font-semibold tracking-wide">Verified</span>' : ''}
                  </div>
                  <div class="text-xs text-slate-400 mt-1 space-y-0.5">
                    <p><span class="text-blue-400 font-medium">${b.category}</span> • دۆخ: ${statusStr === 'active' ? '<span class="text-green-400 font-medium">Active</span>' : '<span class="text-red-500 font-medium">Inactive</span>'}</p>
                    <p class="text-[11px]">ڕەیتینگ: ⭐ ${ratingAvg} | بینین: 👁️ ${viewCount}</p>
                  </div>
                </div>
              </div>
              
              <div class="flex items-center gap-2 border-t border-slate-800 sm:border-0 pt-3 sm:pt-0 justify-end">
                <button type="button" id="btn-edit-${key}" class="flex items-center gap-1.5 text-xs bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 px-3 py-2 rounded-lg border border-blue-500/20 transition-all font-medium">
                  ✎ Edit
                </button>
                <button type="button" id="btn-del-${key}" class="flex items-center gap-1.5 text-xs bg-red-600/10 hover:bg-red-600/20 text-red-400 px-3 py-2 rounded-lg border border-red-500/20 transition-all font-medium">
                  ✕ Delete
                </button>
              </div>
            `;
            listContainer.appendChild(item);

            // ناردنی زانیارییەکان بۆ دەستکاریکردن بەبێ کێشە لە تێکچوونی دەق
            document.getElementById(`btn-edit-${key}`).addEventListener('click', () => {
              window.editBroker(key, b.name, b.category, b.bonusAmount, b.logo || '', b.link, statusStr, ratingAvg, viewCount, rulesText, isVerified);
            });
            document.getElementById(`btn-del-${key}`).addEventListener('click', () => {
              window.deleteBroker(key);
            });
          });
        });
      }

      // پاشەکەوتکردنی داتا لە Firebase بە پێکهاتەی تەواوی سایتی فەرمی
      document.getElementById("broker-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const id = document.getElementById("broker-id").value;
        const brokerData = {
          name: document.getElementById("b-name").value,
          category: document.getElementById("b-category").value,
          bonusAmount: document.getElementById("b-bonusAmount").value,
          logo: document.getElementById("b-logo").value,
          link: document.getElementById("b-link").value,
          rules: document.getElementById("b-rules").value,
          ratingAvg: parseFloat(document.getElementById("b-ratingAvg").value) || 0,
          viewCount: parseInt(document.getElementById("b-viewCount").value) || 0,
          status: document.getElementById("b-status").value,
          verified: document.getElementById("b-verified").checked,
          ratingCount: 0,
          createdAt: new Date().toISOString()
        };

        if (id) {
          update(ref(db, `brokers/${id}`), brokerData).then(() => resetBrokerForm());
        } else {
          // دۆزینەوەی گەورەترین ID بۆ ئەوەی زنجیرەکە وەک پێکهاتەی کۆن تێکنەچێت
          push(brokersRef, brokerData).then(() => resetBrokerForm());
        }
      });

      window.editBroker = function(id, name, category, bonusAmount, logo, link, status, ratingAvg, viewCount, rules, verified) {
        document.getElementById("broker-id").value = id;
        document.getElementById("b-name").value = name;
        document.getElementById("b-category").value = category;
        document.getElementById("b-bonusAmount").value = bonusAmount;
        document.getElementById("b-logo").value = logo;
        document.getElementById("b-link").value = link;
        document.getElementById("b-rules").value = rules;
        document.getElementById("b-ratingAvg").value = ratingAvg;
        document.getElementById("b-viewCount").value = viewCount;
        document.getElementById("b-status").value = status;
        document.getElementById("b-verified").checked = verified;
        
        document.getElementById("form-title").innerHTML = `<span class="w-1.5 h-4 bg-amber-500 rounded-full"></span> دەستکاریکردنی برۆکەر`;
        document.getElementById("cancel-edit").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      window.deleteBroker = function(id) {
        if (confirm("دڵنیای لە سڕینەوەی ئەم برۆکەرە؟")) {
          remove(ref(db, `brokers/${id}`));
        }
      }

      window.resetBrokerForm = function() {
        document.getElementById("broker-form").reset();
        document.getElementById("broker-id").value = "";
        document.getElementById("form-title").innerHTML = `<span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> زیادکردنی برۆکەری نوێ`;
        document.getElementById("cancel-edit").classList.add("hidden");
        document.getElementById("b-ratingAvg").value = "5.0";
        document.getElementById("b-viewCount").value = "0";
      }

      checkAuth();
    </script>
  </body>
</html>
